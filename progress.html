<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>진행현황 — 생활정보 모음</title>
<style>
:root{--bg:#0e1620;--card:#18222e;--card2:#13202d;--line:#26323f;--txt:#e6edf3;--mut:#8a97a6;--ok:#3fb950;--warn:#d29922;--bad:#f85149}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg)}
body{color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR','Malgun Gothic',sans-serif;padding:12px;font-size:14px;-webkit-font-smoothing:antialiased}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;max-width:470px;margin:0 auto}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.hd .t{display:flex;align-items:center;gap:8px}
.hd h1{font-size:16px;font-weight:600}
.date{font-size:12px;color:var(--mut);font-weight:400}
.badge{font-size:12px;font-weight:500;padding:4px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:5px}
.b-green{background:rgba(63,185,80,.16);color:var(--ok)}
.b-warn{background:rgba(210,153,34,.16);color:var(--warn)}
.b-bad{background:rgba(248,81,73,.16);color:var(--bad)}
.sec{font-size:11px;color:var(--mut);letter-spacing:.05em;margin:14px 0 7px;display:flex;align-items:center;gap:6px}
.sec .auto{background:#0c3a2c;color:#06d6a0;border:1px solid #1f6b52;border-radius:7px;padding:1px 7px;font-size:10px;font-weight:700;letter-spacing:0}
.row{display:flex;align-items:center;gap:9px;padding:3px 0;font-size:13px;line-height:1.4}
.row svg{width:15px;height:15px;flex:none}
.row.done svg{color:var(--ok)}
.row.warn svg{color:var(--warn)}
.row .mut{color:var(--mut)}
.metrics{display:flex;gap:7px;margin:11px 0 2px}
.m{flex:1;background:var(--card2);border-radius:9px;padding:8px 10px}
.m .l{font-size:11px;color:var(--mut)}
.m .v{font-size:18px;font-weight:600;margin-top:2px}
.m .v small{font-size:12px;color:var(--mut);font-weight:400}
.div{border-top:1px solid var(--line);margin:13px 0 2px}
.next .row svg{color:var(--mut)}
.pcode{font-size:12.5px;font-weight:600;margin:2px 0 6px}
.pcode .none{color:var(--mut);font-weight:400}
.bar{height:8px;background:#0b1322;border-radius:6px;overflow:hidden;margin:0 0 4px}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,#4D9DE0,#06D6A0);width:0;transition:width .3s}
.cnt{font-size:11.5px;color:var(--mut);text-align:right;margin:0 0 6px}
ul{list-style:none}
li{display:flex;align-items:center;gap:8px;padding:5px 4px;border-bottom:1px dashed #243049;font-size:12.5px}
li:last-child{border-bottom:none}
li.on{opacity:.62}
li.on .lbl{text-decoration:line-through}
li svg{width:15px;height:15px;flex:none}
li.on svg{color:var(--ok)}
li.now svg{color:#7fc1ff}
li.wait svg{color:#4a586e}
.num{font-size:11px;color:#6b7a99;width:16px;text-align:right;flex:none}
.who{font-size:10px;font-weight:800;padding:1px 5px;border-radius:8px;flex:none}
.who.ai{background:#0c3a2c;color:#06d6a0;border:1px solid #1f6b52}
.who.me{background:#3a2f12;color:#ffd166;border:1px solid #5a4a1a}
.lbl{font-size:12.5px}
.star{color:#ff8e8e;font-weight:800;margin-left:2px}
.banner{display:none;margin-top:9px;background:#0c3a2c;border:1px solid #1f6b52;color:#06d6a0;border-radius:9px;padding:9px;text-align:center;font-weight:700;font-size:12.5px}
.banner.show{display:block}
.upd{font-size:11px;color:var(--mut);text-align:right;margin-top:12px}
.agent{background:var(--card2);border-radius:10px;padding:9px 11px;margin-bottom:7px}
.agent .ah{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600}
.agent .st{font-size:10px;font-weight:700;padding:1px 7px;border-radius:7px;margin-left:auto}
.st.active{background:#0c3a2c;color:#06d6a0;border:1px solid #1f6b52}
.st.uncommitted{background:#3a2f12;color:#ffd166;border:1px solid #5a4a1a}
.st.idle{background:#222c3a;color:#6b7a99;border:1px solid #2e3a4a}
.agent .role{font-size:11px;color:var(--mut);margin:3px 0 1px}
.agent .own{font-size:10.5px;color:#5a6b80}
.agent .act{font-size:11px;color:#aeb9c7;margin-top:4px;padding-left:7px;border-left:2px solid #2a3a4d;line-height:1.5}
.agent .act .d{color:var(--mut);font-size:10px}
.advice{background:#13202d;border:1px solid #2a3a4d;border-radius:9px}
.advice .ai{display:flex;gap:8px;padding:7px 11px;font-size:12px;line-height:1.5;border-bottom:1px dashed #243049}
.advice .ai:last-child{border-bottom:none}
.advice .ic{flex:none}
.prow{display:flex;align-items:center;gap:6px;padding:5px 3px;border-bottom:1px dashed #243049;font-size:11.5px}
.prow:last-child{border-bottom:none}
.pcd{color:#7fc1ff;font-weight:700;flex:none;width:46px}
.ptt{flex:1;color:#cdd6e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nd{background:#3a2f12;color:#ffd166;border-radius:5px;padding:0 5px;font-size:9.5px;flex:none}
.pact{color:#06d6a0;font-size:10px;flex:none;font-weight:700}
</style>
</head>
<body>
<div class="card" id="board" role="status">불러오는 중…</div>
<script>
const CHECK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg>';
const LOAD='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3a9 9 0 1 0 9 9"/></svg>';
const NOWI='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>';
const WAIT='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>';
const DOT='<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="3.2"/></svg>';
const STEPS=[{n:1,who:'ai',t:'글감 선정'},{n:2,who:'me',t:'글감 승인',star:1},{n:3,who:'ai',t:'코드 배정'},{n:4,who:'ai',t:'본문 작성 + 팩트체크'},{n:5,who:'ai',t:'썸네일 생성'},{n:6,who:'ai',t:'관련글 내부링크'},{n:7,who:'ai',t:'Blogger 초안'},{n:8,who:'me',t:'라이브 발행',star:1},{n:9,who:'ai',t:'DB 반영 + 검증'},{n:10,who:'ai',t:'배포 (콘솔·카테고리)'},{n:11,who:'me',t:'서치콘솔 색인 요청',star:1},{n:12,who:'ai',t:'색인 반영 실측'}];
const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const fnum=n=>Number(n).toLocaleString('ko-KR');
async function jget(u){try{const r=await fetch(u+'?'+Date.now(),{cache:'no-store'});return await r.json()}catch(e){return null}}
async function load(){
  const [h,db,pg,collab,idx,pend]=await Promise.all([jget('health.json'),jget('lifeinfo_db.txt'),jget('progress.json'),jget('collab.json'),jget('index_status.json'),jget('pending.json')]);
  const recs=db?(Array.isArray(db)?db:(db.posts||[])):[];
  const count=db&&db.count?db.count:recs.length;
  const light=h?h.light:'gray', pass=h?h.pass:0, total=h?(h.pass+h.warn+h.fail):0;
  const avg=pg&&pg.avg?fnum(pg.avg):'—', date=pg&&pg.updated?pg.updated:'';
  const bcls=light==='green'?'b-green':light==='red'?'b-bad':'b-warn';
  const blab=light==='green'?'신호등 green':light==='red'?'신호등 red':'신호등 warn';
  const today=(pg&&pg.today||[]).map(it=>'<div class="row '+(it.done?'done':'warn')+'">'+(it.done?CHECK:LOAD)+'<span>'+esc(it.t)+'</span></div>').join('');
  const next=(pg&&pg.next||[]).map(t=>'<div class="row">'+DOT+'<span class="mut">'+esc(t)+'</span></div>').join('');
  const pl=(pg&&pg.pipeline)||{}, checked=pl.checked||[], done=typeof pl.done==='number'?pl.done:checked.length;
  const omAll=recs.filter(r=>r.osmu&&typeof r.osmu==='object');
  const oNv=omAll.filter(r=>r.osmu.naver).length, oTh=omAll.filter(r=>r.osmu.threads).length;
  const oRecent=omAll.slice(-4).reverse();
  const nowN=pl.code?(STEPS.find(s=>checked.indexOf(s.n)<0)||{}).n:0;
  let pubHtml;
  if(pl.code){
    const pct=Math.round(done/12*100);
    const lis=STEPS.map(st=>{
      const on=checked.indexOf(st.n)>=0, now=(!on&&st.n===nowN);
      const ic=on?CHECK:(now?NOWI:WAIT), cls=on?'on':(now?'now':'wait');
      return '<li class="'+cls+'">'+ic+'<span class="num">'+st.n+'</span>'
        +'<span class="who '+st.who+'">'+(st.who==='ai'?'🤖':'🧑')+'</span>'
        +'<span class="lbl">'+esc(st.t)+(st.star?'<span class="star">★</span>':'')+'</span></li>';
    }).join('');
    pubHtml='<div class="pcode">'+esc(pl.code)+'</div><div class="bar"><i style="width:'+pct+'%"></i></div>'
      +'<div class="cnt">'+done+' / 12 단계'+(pl.note?' · '+esc(pl.note):'')+'</div><ul>'+lis+'</ul>'
      +'<div class="banner'+(done===12?' show':'')+'">✅ 발행 완료</div>';
  }else{
    pubHtml='<div class="pcode none">진행 중인 발행 없음</div>';
  }
  const osmuLi=oRecent.map(r=>'<div class="row done">'+CHECK+'<span>'+esc(r.code)+' '+esc((r.title||'').slice(0,15))+'</span><span class="mut" style="margin-left:auto;font-size:10.5px">'+(r.osmu.naver?'네이버 ':'')+(r.osmu.threads?'쓰레드':'')+'</span></div>').join('');
  // 🤝 협업 — 세션별(collab.json: 정체성=레지스트리·활동=git log·상태=git status)
  const stLab={active:'활동중',uncommitted:'미커밋',idle:'대기'};
  const collabHtml=(collab&&collab.agents||[]).map(a=>{
    const acts=(a.recent||[]).map(r=>'<div class="act">'+esc((r.s||'').slice(0,40))+' <span class="d">'+esc(r.d||'')+'</span></div>').join('');
    return '<div class="agent"><div class="ah">'+esc(a.emoji||'')+'<span>'+esc(a.name||'')+'</span><span class="st '+(a.state||'idle')+'">'+(stLab[a.state]||a.state||'')+'</span></div>'
      +'<div class="role">'+esc(a.role||'')+'</div><div class="own">담당 '+esc(a.owns||'')+'</div>'+acts+'</div>';
  }).join('');
  // 💡 시스템 조언 — 라이브 데이터 조건에서만 도출(하드코딩 일반론 금지)
  const adv=[];
  if(idx&&typeof idx.indexed==='number'){
    if(idx.indexed===0){const cr=Object.values(idx.posts||{}).filter(p=>p&&p.lastCrawl).length;
      adv.push('색인 0/'+idx.total+' — 크롤 '+cr+'편·미크롤 '+(idx.total-cr)+'편. GSC 일일한도+OSMU 백링크로 점진(재검토는 색인 잡힌 뒤).');}
    else adv.push('색인 '+idx.indexed+'/'+idx.total+'편.');
  }
  if(oNv>oTh) adv.push('OSMU 쓰레드 '+oTh+'/'+oNv+' — '+(oNv-oTh)+'편 미게시(rate-limit 보류분 재시도 필요).');
  if(collab&&collab.uncommitted>=10) adv.push('미커밋 '+collab.uncommitted+'파일 — 발행 완료 후 세션별 커밋 분리 권장.');
  const adviceHtml=adv.length?'<div class="advice">'+adv.map(t=>'<div class="ai"><span class="ic">💡</span><span>'+esc(t)+'</span></div>').join('')+'</div>':'<div class="pcode none">현재 조치 필요 항목 없음</div>';
  // 📋 미결 관리 — 글별(pending.json: DB osmu + index_status에서 계산)
  const pc=(pend&&pend.counts)||{};
  const pendRows=(pend&&pend.actionable||[]).map(a=>
    '<div class="prow"><span class="pcd">'+esc(a.code)+'</span><span class="ptt">'+esc(a.title)+'</span>'
    +(a.need||[]).map(n=>'<span class="nd">'+esc(n)+'</span>').join('')
    +'<span class="pact">'+esc(a.action)+'</span></div>').join('');
  const pendHtml='<div class="cnt">OSMU 대기 '+(pc.osmu_pending||0)+'편 · 색인 대기 '+(pc.index_pending||0)+'편 / 전체 '+(pc.total||0)+'편</div>'+(pendRows||'<div class="pcode none">미결 없음</div>');
  document.getElementById('board').innerHTML=
   '<div class="hd"><div class="t"><h1>진행현황</h1><span class="date">'+esc(date)+'</span></div>'
   +'<span class="badge '+bcls+'">'+CHECK+esc(blab)+'</span></div>'
   +'<div class="sec">오늘 한 일</div>'+today
   +'<div class="metrics">'
   +'<div class="m"><div class="l">검사 통과</div><div class="v">'+pass+' <small>/ '+total+'</small></div></div>'
   +'<div class="m"><div class="l">블로그 글</div><div class="v">'+count+' <small>편</small></div></div>'
   +'<div class="m"><div class="l">평균 본문</div><div class="v">'+avg+' <small>자</small></div></div>'
   +'</div>'
   +'<div class="div"></div>'
   +'<div class="sec">발행 진행 (글 1편 · 12단계)<span class="auto">🤖 자동</span></div>'+pubHtml
   +'<div class="div"></div>'
   +'<div class="sec">📡 3채널 발행 현황 (구글·네이버·쓰레드)<span class="auto">🤖 DB 자동집계</span></div>'
   +'<div class="metrics">'
   +'<div class="m"><div class="l">구글(원본)</div><div class="v">'+count+' <small>편</small></div></div>'
   +'<div class="m"><div class="l">네이버</div><div class="v">'+oNv+' <small>편</small></div></div>'
   +'<div class="m"><div class="l">쓰레드</div><div class="v">'+oTh+' <small>편</small></div></div>'
   +'</div>'
   +'<div class="cnt">확산 커버리지 · 네이버 '+(count?Math.round(oNv/count*100):0)+'% · 쓰레드 '+(count?Math.round(oTh/count*100):0)+'% · 교차링크 완료 '+omAll.length+'편</div>'
   +osmuLi
   +'<div class="div"></div>'
   +'<div class="sec">🤝 협업 — 세션별 역할·진행<span class="auto">git 자동분류</span></div>'+collabHtml
   +'<div class="sec">💡 시스템 조언<span class="auto">라이브 도출</span></div>'+adviceHtml
   +'<div class="div"></div>'
   +'<div class="sec">📋 미결 관리 (글별)<span class="auto">DB+색인 자동집계</span></div>'+pendHtml
   +'<div class="sec">다음</div><div class="next">'+next+'</div>'
   +'<div class="upd">자동 갱신 5초 · '+new Date().toLocaleTimeString('ko-KR')+'</div>';
}
load(); setInterval(load,5000);
</script>
</body>
</html>
