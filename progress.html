:root{--bg:#0e1620;--card:#18222e;--card2:#13202d;--line:#26323f;--txt:#e6edf3;--mut:#8a97a6;--ok:#3fb950;--warn:#d29922;--bad:#f85149}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg)}
body{color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR','Malgun Gothic',sans-serif;padding:12px;font-size:14px;-webkit-font-smoothing:antialiased}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;max-width:470px;margin:0 auto}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.hd .t{display:flex;align-items:center;gap:8px}
.hd h1{font-size:16px;font-weight:600}
.date{font-size:12px;color:var(--mut);font-weight:400}
.badge{font-size:12px;font-weight:500;padding:4px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:5px}
.b-green{background:rgba(63,185,80,.16);color:var(--ok)}
.b-warn{background:rgba(210,153,34,.16);color:var(--warn)}
.b-bad{background:rgba(248,81,73,.16);color:var(--bad)}
.sec{font-size:11px;color:var(--mut);letter-spacing:.05em;margin:14px 0 7px;display:flex;align-items:center;gap:6px}
.sec .auto{background:#0c3a2c;color:#06d6a0;border:1px solid #1f6b52;border-radius:7px;padding:1px 7px;font-size:10px;font-weight:700;letter-spacing:0}
.row{display:flex;align-items:center;gap:9px;padding:3px 0;font-size:13px;line-height:1.4}
.row svg{width:15px;height:15px;flex:none}
.row.done svg{color:var(--ok)}
.row.warn svg{color:var(--warn)}
.row .mut{color:var(--mut)}
.metrics{display:flex;gap:7px;margin:11px 0 2px}
.m{flex:1;background:var(--card2);border-radius:9px;padding:8px 10px}
.m .l{font-size:11px;color:var(--mut)}
.m .v{font-size:18px;font-weight:600;margin-top:2px}
.m .v small{font-size:12px;color:var(--mut);font-weight:400}
.div{border-top:1px solid var(--line);margin:13px 0 2px}
.next .row svg{color:var(--mut)}
.pcode{font-size:12.5px;font-weight:600;margin:2px 0 6px}
.pcode .none{color:var(--mut);font-weight:400}
.bar{height:8px;background:#0b1322;border-radius:6px;overflow:hidden;margin:0 0 4px}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,#4D9DE0,#06D6A0);width:0;transition:width .3s}
.cnt{font-size:11.5px;color:var(--mut);text-align:right;margin:0 0 6px}
ul{list-style:none}
li{display:flex;align-items:center;gap:8px;padding:5px 4px;border-bottom:1px dashed #243049;font-size:12.5px}

li.wait svg{color:#4a586e}
.num{font-size:11px;color:#6b7a99;width:16px;text-align:right;flex:none}
.who{font-size:10px;font-weight:800;padding:1px 5px;border-radius:8px;flex:none}
.who.ai{background:#0c3a2c;color:#06d6a0;border:1px solid #1f6b52}
.who.me{background:#3a2f12;color:#ffd166;border:1px solid #5a4a1a}
.lbl{font-size:12.5px}
.star{color:#ff8e8e;font-weight:800;margin-left:2px}

.upd{font-size:11px;color:var(--mut);text-align:right;margin-top:12px}

.st.uncommitted{background:#3a2f12;color:#ffd166;border:1px solid #5a4a1a}
.st.idle{background:#222c3a;color:#6b7a99;border:1px solid #2e3a4a}
.agent .role{font-size:11px;color:var(--mut);margin:3px 0 1px}
.agent .own{font-size:10.5px;color:#5a6b80}

.advice .ai:last-child{border-bottom:none}
.advice .ic{flex:none}
.prow{display:flex;align-items:center;gap:6px;padding:5px 3px;border-bottom:1px dashed #243049;font-size:11.5px}
.prow:last-child{border-bottom:none}
.pcd{color:#7fc1ff;font-weight:700;flex:none;width:46px}
.ptt{flex:1;color:#cdd6e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nd{background:#3a2f12;color:#ffd166;border-radius:5px;padding:0 5px;font-size:9.5px;flex:none}
.pact{color:#06d6a0;font-size:10px;flex:none;font-weight:700}
.qcard{display:flex;gap:9px;padding:8px;margin:6px 0;background:#141c2c;border:1px solid #243049;border-radius:9px}
.qth{width:78px;height:56px;object-fit:cover;border-radius:6px;flex:none;background:#0d1420}

.qbody{flex:1;min-width:0}
.qtop{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.qcode{color:#7fc1ff;font-weight:700;font-size:11.5px}
.qlane{font-size:9px;padding:1px 6px;border-radius:5px;font-weight:700}
.qlane.info{background:#12283a;color:#7fc1ff}
.qlane.pop{background:#2f2136;color:#e0a3ff}

.qmeta{margin-top:4px}
.qdraft{color:#6b7688;font-size:9.5px;margin-left:8px}

.qpv.none{background:none;border:none;color:#54627a;font-weight:400;cursor:default;padding:3px 0}

.ch.off{background:#3a1216;color:#f0707a}

lay:inline-block;font-size:13px;color:#a8968f;text-decoration:none;margin:2px 0 6px}\n<\/style>\n<div class=\"lsg\" id=\"top\">\n<span class=\"cat\">건강·의료<\/span>\n<p>해마다 건강검진 안내문은 받는데, <b>\"암검진은 올해 내가 대상인가?\"<\/b>는 늘 헷갈립니다. 만 나이로 세는 것도 아니고, 암 종류마다 대상 연령과 주기가 제각각이기 때문입니다. 2026년은 <b>짝수 해<\/b>라서 <b>짝수 연도에 태어난 분<\/b>이 2년 주기 암검진 대상입니다. 6대암 대상·주기·비용부터, 대상인데도 놓치기 쉬운 함정까지 한 번에 정리했습니다.<\/p>\n<div class=\"toc\"><b>📑 목차<\/b><a href=\"#sec1\">1. 2026년 내가 대상인지 30초 확인<\/a><a href=\"#sec2\">2. 일반건강검진과 암검진은 다릅니다<\/a><a href=\"#sec3\">3. 6대암 대상·주기·검진방법 총정리<\/a><a href=\"#sec4\">4. 비용 — 어디까지 무료인가<\/a><a href=\"#sec5\">5. 대상에서 빠지는 경우(탈락 사유)<\/a><a href=\"#sec6\">6. 놓치기 쉬운 함정 5가지<\/a><a href=\"#sec7\">7. 자주 묻는 질문<\/a><a href=\"#sec8\">공식 확인 페이지<\/a><\/div>\n<a class=\"cta\" href=\"#sec3\">👉 6대암 대상·주기 표 바로 보기<\/a>\n\n<h2 id=\"sec1\">1. 2026년 내가 대상인지 30초 확인<\/h2>\n<p>국가암검진은 <b>만 나이가 아니라 '출생연도'<\/b>로 대상을 정합니다. 순서대로 확인하세요.<\/p>\n<ol>\n<li><b>2년 주기 암(위암·유방암·자궁경부암·폐암)<\/b> → 짝수 해인 <b>2026년에는 출생연도가 짝수<\/b>인 분이 대상입니다. (예: 1964년·1976년·1982년생 ○ / 1965년·1977년생 ×)<\/li>\n<li><b>대장암<\/b>은 주기가 1년이라 <b>짝수·홀수 상관없이 50세 이상이면 매년<\/b> 대상입니다.<\/li>\n<li><b>간암<\/b>은 고위험군만 <b>6개월마다(연 2회)<\/b> 대상입니다.<\/li>\n<li>최종 확인은 <b>국민건강보험공단 홈페이지·The건강보험 앱 → 건강검진 대상조회<\/b>에서 본인 인증 후 바로 볼 수 있습니다.<\/li>\n<\/ol>\n<div class=\"tip\"><b>💡 계산 예시<\/b><p style=\"margin:8px 0 0\"><b>1964년생(올해 만 62세) 남성<\/b>이라면 → 출생연도 짝수 ○ → 2026년에 <b>위암(내시경)<\/b> 대상이고, 50세가 넘었으니 <b>대장암(분변잠혈)<\/b>은 해마다 대상입니다. 여기에 흡연력이 30갑년 이상이면 <b>폐암 CT<\/b>까지 추가됩니다. 즉 한 해에 최대 3종을 함께 받을 수 있습니다.<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec2\">2. 일반건강검진과 암검진은 다릅니다<\/h2>\n<p>가장 많이 헷갈리는 부분입니다. 같은 안내문에 실려 오지만 <b>제도가 다르고 대상 기준도 다릅니다.<\/b><\/p>\n<table>\n<tr><th>구분<\/th><th>일반건강검진<\/th><th>국가암검진<\/th><\/tr>\n<tr><td>목적<\/td><td>고혈압·당뇨 등 만성질환 조기발견<\/td><td>6대암 조기발견<\/td><\/tr>\n<tr><td>대상<\/td><td>20세 이상 지역가입자·피부양자, 직장가입자 등<\/td><td>암종별 연령 기준(20·40·50·54세~)<\/td><\/tr>\n<tr><td>주기<\/td><td>2년마다(비사무직 직장가입자는 매년)<\/td><td>암종별 6개월·1년·2년<\/td><\/tr>\n<tr><td>본인부담<\/td><td>무료<\/td><td>원칙 10%(일부 무료)<\/td><\/tr>\n<\/table>\n<p>즉 <b>\"건강검진 받았으니 암검진도 끝났다\"는 착각<\/b>이 가장 흔한 실수입니다. 검진기관에서 따로 신청하지 않으면 위내시경·유방촬영은 아예 진행되지 않습니다.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec3\">3. 6대암 대상·주기·검진방법 총정리<\/h2>\n<table>\n<tr><th>암종<\/th><th>대상<\/th><th>주기<\/th><th>검진방법<\/th><\/tr>\n<tr><td>위암<\/td><td>40세 이상 남·여<\/td><td>2년<\/td><td>위내시경검사<\/td><\/tr>\n<tr><td>대장암<\/td><td>50세 이상 남·여<\/td><td>1년<\/td><td>분변잠혈검사 → 양성 시 대장내시경<\/td><\/tr>\n<tr><td>간암<\/td><td>40세 이상 고위험군<\/td><td>6개월<\/td><td>간초음파 + 혈청알파태아단백검사<\/td><\/tr>\n<tr><td>유방암<\/td><td>40세 이상 여성<\/td><td>2년<\/td><td>유방촬영술<\/td><\/tr>\n<tr><td>자궁경부암<\/td><td>20세 이상 여성<\/td><td>2년<\/td><td>자궁경부세포검사<\/td><\/tr>\n<tr><td>폐암<\/td><td>54~74세 고위험군<\/td><td>2년<\/td><td>저선량 흉부 CT<\/td><\/tr>\n<\/table>\n<h3>간암 '고위험군'이란?<\/h3>\n<p>간경변증, B형 간염 바이러스 항원 양성, C형 간염 바이러스 항체 양성, 또는 B형·C형 간염 바이러스에 의한 만성 간질환 환자가 해당합니다. 본인이 해당하면 <b>1년에 두 번<\/b> 검진표가 나옵니다.<\/p>\n<h3>폐암 '30갑년'은 어떻게 계산하나<\/h3>\n<p><b>30갑년 = 하루 평균 담배소비량(갑) × 흡연기간(년)<\/b> 입니다.<\/p>\n<ul>\n<li>하루 <b>1갑씩 30년<\/b> = 1 × 30 = <b>30갑년<\/b> ○ 대상<\/li>\n<li>하루 <b>2갑씩 15년<\/b> = 2 × 15 = <b>30갑년<\/b> ○ 대상<\/li>\n<li>하루 <b>반 갑씩 40년<\/b> = 0.5 × 40 = <b>20갑년<\/b> × 미달<\/li>\n<\/ul>\n<p>여기에 <b>54~74세<\/b>라는 연령 조건과 최근 흡연력 확인이 함께 붙습니다.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec4\">4. 비용 — 어디까지 무료인가<\/h2>\n<table>\n<tr><th>구분<\/th><th>본인부담<\/th><\/tr>\n<tr><td>건강보험가입자 (보험료 상위 50%)<\/td><td>검진비의 <b>10%<\/b><\/td><\/tr>\n<tr><td>└ 단, 대장암·자궁경부암<\/td><td><b>전액 무료<\/b><\/td><\/tr>\n<tr><td>건강보험가입자 (보험료 하위 50%)<\/td><td><b>전액 무료<\/b><\/td><\/tr>\n<tr><td>의료급여수급권자<\/td><td><b>전액 무료<\/b><\/td><\/tr>\n<\/table>\n<p>'하위 50%' 기준은 해마다 고시되며, <b>2024년 기준으로는 직장가입자 월 보험료 125,000원 이하, 지역가입자 월 보험료 67,500원 이하<\/b>였습니다. 본인 보험료는 건강보험공단 홈페이지에서 확인할 수 있고, 대상 여부는 검진표에 표시돼 나옵니다.<\/p>\n<div class=\"tip\"><b>💡 판단 요령<\/b><p style=\"margin:8px 0 0\">월급명세서의 건강보험료가 12만원대 이하라면 하위 50%일 가능성이 큽니다. 그렇다면 위내시경까지 <b>전액 무료<\/b>입니다. 반대로 상위 50%라도 <b>대장암·자궁경부암은 어차피 무료<\/b>이니, 비용 때문에 미루는 것은 실익이 없습니다.<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec5\">5. 대상에서 빠지는 경우(탈락 사유)<\/h2>\n<p>검진표를 못 받았거나, 병원에서 \"대상이 아니다\"라는 말을 듣는 대표적 이유입니다.<\/p>\n<ul>\n<li><b>출생연도가 홀수<\/b> — 2년 주기 암은 2026년(짝수 해)에는 대상이 아닙니다. 2027년을 기다려야 합니다.<\/li>\n<li><b>연령 미달<\/b> — 위암·유방암·간암은 40세, 대장암은 50세, 폐암은 54세부터입니다. 39세는 위내시경 대상이 아닙니다.<\/li>\n<li><b>폐암 흡연력 미달<\/b> — 30갑년에 못 미치면 나이가 맞아도 제외됩니다.<\/li>\n<li><b>간암 고위험군 미해당<\/b> — 간염·간경변 병력이 확인되지 않으면 40세여도 간초음파 대상이 아닙니다.<\/li>\n<li><b>이미 그 해에 같은 암검진을 받은 경우<\/b> — 주기 내 중복 수검은 지원되지 않습니다.<\/li>\n<li><b>해당 암으로 이미 치료·추적관찰 중인 경우<\/b> — 검진이 아니라 진료 영역이므로 진료과에서 관리합니다.<\/li>\n<\/ul>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec6\">6. 놓치기 쉬운 함정 5가지<\/h2>\n<ol>\n<li><b>대장내시경은 '무조건 무료'가 아닙니다.<\/b> 국가암검진의 1차 검사는 <b>분변잠혈검사<\/b>이고, 여기서 <b>양성이 나온 경우에만<\/b> 대장내시경이 이어집니다. 본인이 원해서 바로 받는 대장내시경은 국가검진이 아니라 자비 부담입니다.<\/li>\n<li><b>위내시경 중 조직검사를 하면 그 비용은 별도<\/b>입니다. 검진 자체는 지원되지만 조직검사·수면(진정) 비용은 대개 본인부담입니다. 예약할 때 수면 비용을 미리 물어보세요.<\/li>\n<li><b>검진표(안내문)를 못 받아도 검진은 가능합니다.<\/b> 신분증만 들고 검진기관에 가면 대상 여부를 조회해 줍니다. 안내문 분실은 미수검의 이유가 되지 않습니다.<\/li>\n<li><b>11~12월에 몰립니다.<\/b> 연말이면 위내시경 예약이 몇 주씩 밀립니다. 대상인 해의 <b>상·하반기 중 여유 있을 때<\/b> 받는 편이 훨씬 수월합니다.<\/li>\n<li><b>결과지는 15일 이내에 옵니다.<\/b> 검진기관은 검진완료일로부터 15일 이내에 본인에게 결과를 통보하게 돼 있습니다. 그 이상 소식이 없으면 검진기관에 직접 확인하세요.<\/li>\n<\/ol>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec7\">7. 자주 묻는 질문<\/h2>\n<h3>Q. 직장에서 받는 건강검진에 암검진이 포함되나요?<\/h3>\n<p>직장 검진기관에서 함께 받을 수 있지만, <b>암검진 대상자에 해당해야<\/b> 지원됩니다. 예약할 때 \"국가암검진도 함께 받겠다\"고 미리 말해야 항목이 추가됩니다.<\/p>\n<h3>Q. 위내시경 대신 위장조영촬영을 받을 수 있나요?<\/h3>\n<p>검진기관과 수검자 상태에 따라 선택 가능한 경우가 있습니다. 다만 기본 방법은 위내시경이므로, 대체 가능 여부는 검진기관에 확인하세요.<\/p>\n<h3>Q. 작년에 안 받았는데 올해 몰아서 받을 수 있나요?<\/h3>\n<p>2년 주기 암은 해당 연도(짝수/홀수)에 받는 것이 원칙이라 지난해 분을 소급해 받기는 어렵습니다. 대신 <b>대장암은 매년<\/b> 대상이므로 올해분을 바로 받으면 됩니다.<\/p>\n<h3>Q. 배우자(피부양자)도 대상인가요?<\/h3>\n<p>네. 건강보험 <b>피부양자<\/b>와 <b>의료급여수급권자<\/b>도 대상입니다. 연령·출생연도 조건은 동일하게 적용됩니다.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec8\">공식 확인 페이지<\/h2>\n<div class=\"gov\"><b>🏛️ 공식 안내 바로가기<\/b><a href=\"https://www.cancer.go.kr/lay1/S1T549C553/sublink.do\" target=\"_blank\" rel=\"nofollow\">▸ 국가암정보센터 — 국가암검진 대상자 선정 및 통보<\/a><a href=\"https://www.cancer.go.kr/lay1/S1T553C556/contents.do\" target=\"_blank\" rel=\"nofollow\">▸ 국가암정보센터 — 결과통보 및 검진 비용<\/a><a href=\"https://www.ncc.re.kr/main.ncc?uri=manage01_4\" target=\"_blank\" rel=\"nofollow\">▸ 국립암센터 — 국가암검진사업 안내<\/a><a href=\"https://www.nhis.or.kr/\" target=\"_blank\" rel=\"nofollow\">▸ 국민건강보험공단 — 건강검진 대상조회<\/a><\/div>\n<div class=\"end\"><b>✅ 마무리<\/b><p style=\"margin:8px 0 0\">2026년은 <b>짝수 해<\/b>이므로 <b>짝수 연도 출생자<\/b>가 위암·유방암·자궁경부암·폐암 대상이고, <b>대장암은 50세 이상이면 매년<\/b>, <b>간암 고위험군은 6개월마다<\/b>입니다. 상위 50%도 <b>대장암·자궁경부암은 무료<\/b>이고 하위 50%·의료급여는 전액 무료입니다. 연말에 몰리기 전에 미리 예약하세요.<\/p><\/div>\n<div class=\"src\"><b>📌 정보 기준 · 출처<\/b>이 글은 <b style=\"display:inline;color:#5a3a30;margin:0\">2026년 7월<\/b> 기준이며, 대상 기준·비용은 제도 개편에 따라 바뀔 수 있습니다. 본인 대상 여부는 국민건강보험공단에서 확인하세요.<br>출처: 국가암정보센터 국가암검진사업 안내, 국립암센터 국가암관리사업, 국민건강보험공단<\/div>\n<div class=\"rel\"><b>🔗 함께 보면 좋은 글<\/b><a href=\"https://lifeinfo8975.blogspot.com/2026/06/2026.html\">▸ 2026 국가건강검진 대상자 조회 무료 항목 총정리<\/a><a href=\"https://lifeinfo8975.blogspot.com/2026/07/2026-5-10.html\">▸ 산정특례 대상 신청 방법 등록 질환 본인부담률 총정리 (암 5%)<\/a><a href=\"https://lifeinfo8975.blogspot.com/2026/07/2026_01966929634.html\">▸ 건강보험 본인부담상한제 환급 신청 방법 기준 상한액 총정리<\/a><\/div>\n\n<div id=\"ymyl-disclaimer\" style=\"margin-top:22px;font-size:13px;color:#666;line-height:1.6\">본 글은 정보 제공용이며, 실제 대상 여부·검진 항목·비용은 국민건강보험공단 확인에 따릅니다.<\/div>\n<div id=\"post-byline\" style=\"border-top:1px solid #e5e7eb;margin-top:28px;padding-top:12px;font-size:13px;color:#666;line-height:1.6;\">글쓴이 <b>이상곤<\/b> · 이 글의 수치·자격·기한은 <b>공식 자료를 직접 확인<\/b>해 정리했으며, 본문에 출처와 기준일을 표기했습니다. 제도는 바뀔 수 있으니 신청 전 공식 페이지를 확인하세요. <a href=\"/p/blog-page_17.html\">정보 확인 방법·고지<\/a><\/div>\n<\/div>\n----------------------------------------------------------------\n▼ OSMU 확산용 핵심 3줄 요약 (네이버 블로그·쓰레드용)\n1. 국가암검진은 만 나이가 아니라 '출생연도' 기준이에요. 2026년은 짝수 해라 짝수 연도 출생자가 위암·유방암·자궁경부암·폐암(2년 주기) 대상이고, 대장암은 50세 이상이면 매년, 간암 고위험군은 6개월마다예요.\n2. 비용은 원칙 10% 본인부담인데, 대장암·자궁경부암은 누구나 무료이고 건강보험료 하위 50%·의료급여수급권자는 전액 무료예요.\n3. 함정 주의! 대장내시경은 분변잠혈 양성일 때만 지원되고, 위내시경 조직검사·수면비는 별도예요. 검진표를 잃어버려도 신분증만 있으면 받을 수 있으니 연말 예약 대란 전에 미리 받으세요.\n"},{"code":"A2-08","title":"국민행복카드 임신출산 진료비 바우처 신청 방법 사용처 지원금액 총정리 (2026)","lane":"info","thumb":"","draft":"","facts":"각도=임신초기 필수정보. 임신출산 진료비(단태/다태)·사용처·카드사. 출처=정부24·국민행복카드. 연중수요","added":"2026-07-18","thumb_data":null,"body":null},{"code":"A2-09","title":"주거급여 신청 자격 소득기준 임차급여 수선유지급여 총정리 (2026)","lane":"info","thumb":"","draft":"","facts":"각도=기초생활 4대급여 중 주거. 소득인정액 기준·지역별 임차급여 상한·자가 수선유지. 출처=복지로·마이홈. 기존 A2-03 생계급여와 구분","added":"2026-07-18","thumb_data":null,"body":null},{"code":"A2-10","title":"장애인활동지원서비스 신청 방법 등급 급여량 본인부담금 총정리 (2026)","lane":"info","thumb":"","draft":"","facts":"각도=장애인 돌봄. 종합조사 활동지원등급·월 급여량·소득별 본인부담. 출처=복지로·국민연금공단. 연중수요","added":"2026-07-18","thumb_data":null,"body":null},{"code":"A4-06","title":"개인회생 신청 자격 절차 비용 변제금 면책 총정리 (2026)","lane":"info","thumb":"","draft":"","facts":"각도=채무조정(A4 새출발기금 계열). 자격·변제기간·최저변제금·면책. 출처=대법원 전자소송·법률구조공단. 연중 고민검색층","added":"2026-07-18","thumb_data":null,"body":null},{"code":"A3-07","title":"국민연금 임의계속가입 조건 보험료 신청 방법 손익 총정리 (2026 60세 이후 65세까지)","lane":"info","thumb":"125_npscontinue.png","draft":"국민연금임의계속가입_글_HTML.txt","facts":"2026-01-01 보험료율 9%→9.5%(2033년 13%까지 매년 0.5%p) · 소득대체율 41.5%→43% · 임의계속 대상=60세 도달~65세 전, 전액 본인부담 · 노령연금 최소가입 10년(120개월) · 제외=반환일시금 수령자·납부이력 없음·노령연금 수급중·65세 이상 · 6개월 전액미납 시 직권탈퇴","added":"2026-07-23","thumb_data":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAkGBwgHBgkIBwgKCgkLDRYPDQwMDRsUFRAWIB0iIiAdHx8kKDQsJCYxJx8fLT0tMTU3Ojo6Iys/RD84QzQ5Ojf/2wBDAQoKCg0MDRoPDxo3JR8lNzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzf/wAARCACIAQQDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII border-radius:12px;padding:14px 18px;margin-top:22px;font-size:14px;line-height:1.7;color:#33503a}\n.lsg .src b{display:block;font-size:14px;color:#2e7d4f;margin-bottom:6px}\n.lsg .src a{color:#1b6fc2;text-decoration:none;font-weight:600}\n.lsg .rel{background:#eefaf7;border:1px solid #cfeee6;border-radius:12px;padding:14px 20px;margin-top:22px}\n.lsg .rel b{display:block;font-size:14px;color:#1a8c78;margin-bottom:8px}\n.lsg .rel a{display:block;color:#1f6f61;text-decoration:none;padding:5px 0;font-size:15px;font-weight:600}\n.lsg .top{display:inline-block;font-size:13px;color:#93a7a1;text-decoration:none;margin:2px 0 6px}\n<\/style>\n<div class=\"lsg\" id=\"top\">\n<span class=\"cat\">정부지원·복지<\/span>\n<p>국민연금은 <b>만 60세가 되면 의무 가입이 끝납니다.<\/b> 그런데 이때 가입기간이 <b>10년(120개월)에 못 미치면 연금이 아니라 일시금<\/b>으로 받게 되고, 10년을 넘겼더라도 더 내면 연금액이 더 늘어납니다. 그래서 60세부터 65세 전까지 본인이 원해서 계속 내는 제도가 <b>임의계속가입<\/b>입니다. 2026년부터 보험료율이 <b>9% → 9.5%<\/b>로 오르면서 \"지금 더 내는 게 이득인지\" 판단이 더 중요해졌습니다. 조건·보험료·불가 사유·손익 계산까지 공식 기준으로 정리했습니다.<\/p>\n<div class=\"toc\"><b>📑 목차<\/b><a href=\"#sec1\">1. 임의계속가입이란 — 누가 대상인가<\/a><a href=\"#sec2\">2. 2026년 보험료는 얼마 (9.5% 인상)<\/a><a href=\"#sec3\">3. 신청 방법 · 기한 · 탈퇴<\/a><a href=\"#value-add\">4. 손익 계산 — 2년 더 내면 얼마 회수되나<\/a><a href=\"#sec4\">5. 임의계속 vs 추납 vs 반납, 뭐가 유리한가<\/a><a href=\"#sec5\">6. 신청 못 하는 경우 5가지 (탈락 사유)<\/a><a href=\"#sec6\">7. 자주 묻는 질문<\/a><a href=\"#sec7\">공식 확인 페이지<\/a><\/div>\n<a class=\"cta\" href=\"#value-add\">👉 2년 더 내면 얼마나 이득인지 계산 먼저 보기<\/a>\n<h2 id=\"sec1\">1. 임의계속가입이란 — 누가 대상인가<\/h2>\n<p>국민연금 가입자(또는 가입자였던 사람)가 <b>60세에 도달해 자격을 잃었을 때<\/b>, 본인이 희망하면 <b>65세가 될 때까지<\/b> 계속 보험료를 낼 수 있는 제도입니다. 신청 목적은 크게 두 가지입니다.<\/p>\n<ul>\n<li><b>수급자격 확보형<\/b> — 가입기간이 <b>10년(120개월)에 미달<\/b>해 그대로 두면 연금이 아니라 <b>반환일시금<\/b>으로 끝나는 경우. 부족한 개월을 채워 <b>평생 받는 연금<\/b>으로 바꾸는 것이 목적입니다.<\/li>\n<li><b>연금액 증액형<\/b> — 이미 10년을 넘겨 수급자격은 있지만, <b>가입기간을 더 늘려 월 연금액을 키우려는<\/b> 경우.<\/li>\n<\/ul>\n<div class=\"tip\"><b>💡 '임의가입'과 헷갈리지 마세요<\/b><p style=\"margin:8px 0 0\"><b>임의가입<\/b>은 소득이 없는 <b>18~59세<\/b>(전업주부·학생 등)가 스스로 가입하는 제도이고, <b>임의계속가입<\/b>은 <b>60세 이후<\/b>에 계속 내는 제도입니다. 이름이 비슷해도 대상 연령이 다릅니다. 또 <b>추납(추후납부)<\/b>은 과거 못 낸 기간을 메우는 것이라 또 다른 제도입니다(4·5번 항목에서 비교).<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec2\">2. 2026년 보험료는 얼마 (9.5% 인상)<\/h2>\n<p>2026년 1월 1일부터 국민연금 보험료율이 <b>9% → 9.5%<\/b>로 올랐습니다. 1998년 이후 첫 인상이며, 이후 <b>매년 0.5%p씩 올라 2033년 13%<\/b>에 도달할 예정입니다.<\/p>\n<table>\n<tr><th>연도<\/th><th>보험료율<\/th><th>비고<\/th><\/tr>\n<tr><td>~2025년<\/td><td>9.0%<\/td><td>1998년 이후 동일<\/td><\/tr>\n<tr><td><b>2026년<\/b><\/td><td><b>9.5%<\/b><\/td><td>첫 인상(1월 1일 시행)<\/td><\/tr>\n<tr><td>2027년<\/td><td>10.0%<\/td><td>매년 +0.5%p<\/td><\/tr>\n<tr><td>2033년~<\/td><td>13.0%<\/td><td>최종 목표율<\/td><\/tr>\n<\/table>\n<p>임의계속가입자의 보험료는 <b>기준소득월액 × 보험료율<\/b>이며, 직장가입자와 달리 <b>회사 부담분이 없어 전액 본인이 냅니다.<\/b> 기준소득월액은 하한액~상한액 범위 안에서 정해지고, 이 상·하한액은 <b>매년 3월 말 고시되어 그해 7월부터 1년간<\/b> 적용됩니다. 본인에게 적용될 정확한 금액은 <b>종별(사업장·지역·임의계속)에 따라 다르게 적용될 수 있어<\/b> 신청 전 공단 상담이 필요합니다.<\/p>\n<table>\n<tr><th>기준소득월액<\/th><th>월 보험료 (9.5%)<\/th><th>1년 부담<\/th><\/tr>\n<tr><td>100만 원<\/td><td>9만 5,000원<\/td><td>114만 원<\/td><\/tr>\n<tr><td>150만 원<\/td><td>14만 2,500원<\/td><td>171만 원<\/td><\/tr>\n<tr><td>200만 원<\/td><td>19만 원<\/td><td>228만 원<\/td><\/tr>\n<tr><td>300만 원<\/td><td>28만 5,000원<\/td><td>342만 원<\/td><\/tr>\n<\/table>\n<div class=\"tip\"><b>💡 저소득 지역가입자 지원<\/b><p style=\"margin:8px 0 0\">농어업인이거나 저소득 지역가입자에 해당하면 보험료 일부를 국고에서 지원받을 수 있습니다. 본인이 지원 대상인지도 <b>신청할 때 함께 문의<\/b>하세요.<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec3\">3. 신청 방법 · 기한 · 탈퇴<\/h2>\n<ol>\n<li><b>신청 시기<\/b>: 60세 도달로 자격을 잃은 뒤부터 <b>65세가 되기 전까지<\/b> 신청할 수 있습니다. 보험료를 낼 수 있는 최종 상한은 <b>만 65세 생일 전날<\/b>까지입니다.<\/li>\n<li><b>신청 방법<\/b>: <b>인터넷(국민연금 전자민원), 방문, 우편, 전화, 팩스<\/b> 모두 가능합니다. 전화 상담·신청은 <b>국민연금공단 1355<\/b>.<\/li>\n<li><b>납부<\/b>: 자동이체·고지서 납부 모두 가능하며 <b>전액 본인 부담<\/b>입니다.<\/li>\n<li><b>탈퇴<\/b>: 의무 가입이 아니므로 <b>원할 때 탈퇴<\/b>할 수 있습니다. 다만 <b>보험료를 6개월 동안 전액 미납하면 직권으로 탈퇴<\/b> 처리됩니다(과거 3개월 기준에서 6개월로 완화).<\/li>\n<\/ol>\n<div class=\"tip\"><b>⏰ 가장 중요한 기한<\/b><p style=\"margin:8px 0 0\"><b>65세가 지나면 재가입이 불가능합니다.<\/b> 그 시점까지 10년을 못 채웠다면 그동안 낸 보험료는 연금이 아니라 <b>반환일시금<\/b>으로 받게 됩니다. 60세가 다가온다면 <b>내 가입기간이 몇 개월인지부터<\/b> 확인하세요(내연금 알아보기에서 조회 가능).<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"value-add\">4. 손익 계산 — 2년 더 내면 얼마나 회수되나<\/h2>\n<p>제도 설명만으로는 판단이 안 됩니다. <b>\"내가 얼마를 더 내고, 그 돈을 언제 회수하느냐\"<\/b>가 결정 기준입니다. 아래는 <b>가입기간 8년(96개월)인 사람이 2년(24개월)을 더 내 10년을 채우는<\/b> 상황의 계산입니다.<\/p>\n\n<h3>① 2년치 총 납부액 (2026년 9.5% 기준)<\/h3>\n<table>\n<tr><th>기준소득월액<\/th><th>월 보험료<\/th><th>24개월 총액<\/th><\/tr>\n<tr><td>100만 원<\/td><td>9만 5,000원<\/td><td><b>228만 원<\/b><\/td><\/tr>\n<tr><td>150만 원<\/td><td>14만 2,500원<\/td><td><b>342만 원<\/b><\/td><\/tr>\n<tr><td>200만 원<\/td><td>19만 원<\/td><td><b>456만 원<\/b><\/td><\/tr>\n<\/table>\n\n<h3>② 원금 회수에 걸리는 개월 수<\/h3>\n<p>핵심은 <b>이 2년을 안 채우면 연금이 0원(일시금으로 종결)<\/b>이라는 점입니다. 즉 채우면 받게 될 <b>월 연금액 전부가 순증<\/b>입니다. 납부총액을 월 연금액으로 나누면 회수기간이 나옵니다.<\/p>\n<table>\n<tr><th>24개월 납부액<\/th><th>월 연금 20만 원이면<\/th><th>월 연금 35만 원이면<\/th><th>월 연금 50만 원이면<\/th><\/tr>\n<tr><td>228만 원<\/td><td>약 <b>11개월<\/b><\/td><td>약 <b>7개월<\/b><\/td><td>약 <b>5개월<\/b><\/td><\/tr>\n<tr><td>342만 원<\/td><td>약 <b>17개월<\/b><\/td><td>약 <b>10개월<\/b><\/td><td>약 <b>7개월<\/b><\/td><\/tr>\n<tr><td>456만 원<\/td><td>약 <b>23개월<\/b><\/td><td>약 <b>13개월<\/b><\/td><td>약 <b>10개월<\/b><\/td><\/tr>\n<\/table>\n<div class=\"tip\"><b>📐 이 표를 읽는 법<\/b><p style=\"margin:8px 0 0\">회수기간이 <b>대부분 1~2년<\/b>입니다. 그 뒤로는 <b>평생 받는 금액이 전부 이익<\/b>이고, 국민연금은 <b>매년 물가상승률만큼 올려 지급<\/b>되며 사망 시 유족연금으로도 이어집니다. 그래서 \"10년을 못 채운 상태\"라면 임의계속가입은 거의 예외 없이 유리한 선택으로 평가됩니다. 단 <b>본인의 실제 예상 월 연금액<\/b>은 가입기간·소득에 따라 다르므로, 아래 공단 <b>'내 연금 알아보기'<\/b>에서 반드시 본인 숫자로 확인하세요(위 20/35/50만 원은 계산 방법을 보여주기 위한 가정값입니다).<\/p><\/div>\n\n<h3>③ 이미 10년을 넘긴 사람은 판단이 다릅니다<\/h3>\n<p>수급자격이 이미 있는 경우, 임의계속가입은 <b>\"0 → 연금\"이 아니라 \"연금 → 조금 더 많은 연금\"<\/b>입니다. 증액폭이 크지 않을 수 있으므로 아래를 따져보세요.<\/p>\n<ul>\n<li><b>증액분 확인이 먼저<\/b> — 공단에 \"임의계속으로 N개월 더 내면 월 얼마가 되는지\" 물어 <b>증액분을 숫자로 받고<\/b> 위 방식대로 회수기간을 계산하세요.<\/li>\n<li><b>당장의 현금 여력<\/b> — 60대 초반은 소득이 끊기는 시기입니다. 보험료가 전액 본인 부담(회사 절반 없음)이라는 점을 감안해야 합니다.<\/li>\n<li><b>연기연금과 비교<\/b> — 연금액을 늘리는 방법으로는 <b>수급을 미루는 연기연금<\/b>도 있습니다. 둘 중 어느 쪽이 유리한지는 건강·소득 상황에 따라 갈립니다.<\/li>\n<\/ul>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec4\">5. 임의계속 vs 추납 vs 반납, 뭐가 유리한가<\/h2>\n<p>가입기간을 늘리는 방법은 세 가지인데, <b>상황이 다르면 정답도 다릅니다.<\/b><\/p>\n<table>\n<tr><th>제도<\/th><th>어떤 상황용<\/th><th>핵심 조건<\/th><\/tr>\n<tr><td><b>임의계속가입<\/b><\/td><td>60세가 됐는데 기간이 <b>부족하거나 더 늘리고 싶을 때<\/b><\/td><td>60세~65세 전, 전액 본인 부담<\/td><\/tr>\n<tr><td><b>추납(추후납부)<\/b><\/td><td>과거 <b>납부예외·경력단절 기간<\/b>이 있을 때<\/td><td>납부 이력이 있어야 하고, 신청 시점에 <b>가입자 자격이 있어야<\/b> 함<\/td><\/tr>\n<tr><td><b>반납<\/b><\/td><td>과거에 <b>반환일시금을 받아<\/b> 기간이 사라졌을 때<\/td><td>받은 일시금 + <b>이자<\/b>를 함께 반납<\/td><\/tr>\n<\/table>\n<div class=\"tip\"><b>💡 순서가 중요합니다<\/b><p style=\"margin:8px 0 0\"><b>추납은 '가입자 자격이 있는 동안'에만 신청<\/b>할 수 있습니다. 60세가 지나 자격을 잃은 상태라면, <b>먼저 임의계속가입으로 자격을 되살린 뒤<\/b> 추납을 신청하는 흐름이 됩니다. 반대로 자격을 잃은 채 시간을 흘려보내면 추납 기회 자체가 닫힙니다. 추납으로 인정되는 기간에는 한도가 있으니 <b>본인 인정 개월 수는 공단에서 확인<\/b>하세요.<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec5\">6. 신청 못 하는 경우 5가지 (탈락 사유)<\/h2>\n<p>신청하려다 막히는 대표적인 경우입니다. <b>미리 알고 대비<\/b>해야 하는 지점입니다.<\/p>\n<table>\n<tr><th>이런 경우<\/th><th>왜 안 되나 / 어떻게 하나<\/th><\/tr>\n<tr><td><b>이미 반환일시금을 받았다<\/b><\/td><td>일시금 수령으로 가입 이력이 정리된 상태 → 임의계속 대상에서 제외. <b>반납(일시금+이자) 가능 여부<\/b>를 공단에 먼저 확인<\/td><\/tr>\n<tr><td><b>보험료 납부 이력이 전혀 없다<\/b><\/td><td>전액 미납 등 <b>낸 적이 없는 경우<\/b>는 신청 불가<\/td><\/tr>\n<tr><td><b>이미 노령연금을 받고 있다<\/b><\/td><td>연금 수급이 시작되면 임의계속 대상이 아님. <b>연금을 청구하는 순간 더 늘릴 기회가 닫힙니다<\/b><\/td><\/tr>\n<tr><td><b>만 65세가 지났다<\/b><\/td><td>납부 상한 연령 초과 → <b>재가입 불가<\/b>. 10년 미달이면 일시금으로 종결<\/td><\/tr>\n<tr><td><b>가입 후 6개월 전액 미납<\/b><\/td><td>공단이 <b>직권 탈퇴<\/b> 처리. 65세 전이면 다시 신청 가능하나 <b>공백만큼 기간 손해<\/b><\/td><\/tr>\n<\/table>\n<div class=\"tip\"><b>⏰ 확인 순서<\/b><p style=\"margin:8px 0 0\">① 내 가입기간(개월) 조회 → ② 10년까지 몇 개월 부족한지 계산 → ③ 예상 연금액 조회 → ④ 위 표로 회수기간 계산 → ⑤ 1355로 기준소득월액·추납 가능 여부 상담 → ⑥ 신청. <b>60세 생일 전에 ①~③을 미리 해두면<\/b> 공백 없이 이어집니다.<\/p><\/div>\n<!-- [운영자 경험 자리] 부모님·본인 임의계속 상담을 실제로 해본 적 있으면 1~2문장만. 없으면 비워둠 -->\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec6\">7. 자주 묻는 질문<\/h2>\n<h3>Q. 60세인데 가입기간이 3년밖에 안 됩니다. 그래도 의미가 있나요?<\/h3>\n<p>65세까지 최대 5년(60개월)을 더 낼 수 있으므로 3년 + 5년 = 8년으로 <b>10년에는 여전히 못 미칩니다.<\/b> 이럴 때는 <b>과거 납부예외 기간에 대한 추납<\/b>으로 함께 메울 수 있는지가 관건입니다. 임의계속가입으로 자격을 살린 뒤 추납이 가능한지 1355에 확인해 보세요. 방법이 없다면 반환일시금으로 받는 선택이 남습니다.<\/p>\n<h3>Q. 보험료를 낮게 낼 수도 있나요?<\/h3>\n<p>기준소득월액은 하한액~상한액 범위 안에서 정해지며, 부담을 줄이려면 낮은 쪽으로 정할 수 있습니다. 다만 <b>낮게 내면 늘어나는 연금액도 작아집니다.<\/b> 종별에 따라 적용 기준이 달라질 수 있어 <b>신청 전 공단 상담<\/b>이 필요합니다.<\/p>\n<h3>Q. 임의계속으로 내는 동안 연금을 받을 수 있나요?<\/h3>\n<p>아닙니다. <b>노령연금을 청구해 받기 시작하면 임의계속가입 대상에서 제외<\/b>됩니다. 즉 '연금 받으면서 계속 납부해 더 늘리기'는 되지 않습니다. 늘릴지, 지금 받을지를 <b>먼저 결정<\/b>해야 합니다.<\/p>\n<h3>Q. 중간에 그만두면 낸 돈은 어떻게 되나요?<\/h3>\n<p>탈퇴해도 <b>낸 기간은 그대로 가입기간으로 남습니다.<\/b> 최종적으로 10년을 채웠으면 연금으로, 못 채웠으면 반환일시금으로 정산됩니다.<\/p>\n<h3>Q. 2026년에 보험료율이 올랐는데 지금 시작하면 손해 아닌가요?<\/h3>\n<p>부담이 늘어난 것은 맞지만, 같은 개정으로 <b>소득대체율(연금 지급 수준)도 41.5% → 43%로 인상<\/b>되었고 <b>국가의 지급보장이 법에 명시<\/b>되었습니다. 위 4번의 회수기간 계산에서 보듯 <b>10년 미달 상태<\/b>라면 요율 인상을 감안해도 유리한 쪽이 일반적입니다. 본인 숫자로 계산해 판단하세요.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec7\">공식 확인 페이지<\/h2>\n<div class=\"gov\"><b>🏛️ 공식 안내 바로가기<\/b><a href=\"https://www.nps.or.kr/pnsinfo/ntpsklg/getOHAF0032M0.do\" target=\"_blank\" rel=\"nofollow\">▸ 국민연금공단 — 임의계속가입자 안내<\/a><a href=\"https://www.nps.or.kr/elctcvlcpt/comm/getOHAC0000M5.do?menuId=MN24001069\" target=\"_blank\" rel=\"nofollow\">▸ 국민연금공단 — 임의계속가입 인터넷 신청<\/a><a href=\"https://www.nps.or.kr/pnsinfo/ntpsklg/getOHAF0038M0.do\" target=\"_blank\" rel=\"nofollow\">▸ 국민연금공단 — 연금보험료(보험료율·기준소득월액)<\/a><a href=\"https://www.mohw.go.kr/menu.es?mid=a10714010100\" target=\"_blank\" rel=\"nofollow\">▸ 보건복지부 — 가입대상 및 연금보험료<\/a><\/div>\n<div class=\"end\"><b>✅ 마무리<\/b><p style=\"margin:8px 0 0\">임의계속가입은 <b>60세부터 65세 전까지<\/b> 본인이 원해 계속 내는 제도이고, 2026년 보험료는 <b>기준소득월액 × 9.5%(전액 본인 부담)<\/b>입니다. 가입기간이 <b>10년에 미달<\/b>한다면 회수기간이 대개 1~2년이라 유리한 선택이고, 이미 10년을 넘겼다면 <b>증액분을 숫자로 받아 비교<\/b>해야 합니다. 놓치면 안 되는 것은 딱 하나 — <b>65세가 지나면 다시는 못 넣습니다.<\/b> 60세가 가까워졌다면 오늘 내 가입기간부터 조회해 보세요(1355).<\/p><\/div>\n<div class=\"src\"><b>📌 정보 기준 · 출처<\/b>이 글은 <b style=\"display:inline;color:#33503a;margin:0\">2026년 7월<\/b> 기준이며, 보험료율·기준소득월액 상하한·가입 요건은 변경될 수 있습니다(기준소득월액 상·하한액은 매년 7월 갱신). 신청 전 국민연금공단(1355)에서 최신 기준을 확인하세요.<br>출처: <a href=\"https://www.nps.or.kr\">국민연금공단<\/a> 임의계속가입·연금보험료 안내, <a href=\"https://www.mohw.go.kr\">보건복지부<\/a> 국민연금정책, 대한민국 정책브리핑(2026년 국민연금 제도 개편)<\/div>\n<div class=\"rel\"><b>🔗 함께 보면 좋은 글<\/b><a href=\"https://lifeinfo8975.blogspot.com/2026/06/blog-post_813.html\">▸ 국민연금 예상 수령액 조회 방법 수령나이 총정리<\/a><a href=\"https://lifeinfo8975.blogspot.com/2026/07/2026_01162794658.html\">▸ 국민연금 추납 임의가입 방법 못 낸 기간 채워 수령액 늘리기 총정리 (2026)<\/a><a href=\"https://lifeinfo8975.blogspot.com/2026/07/2026_01191203420.html\">▸ 국민연금 조기노령연금 연기연금 신청 방법 감액률 증액률 손익분기 총정리 (2026)<\/a><\/div>\n\n<div id=\"ymyl-disclaimer\" style=\"margin-top:22px;font-size:13px;color:#666;line-height:1.6\">본 글은 정보 제공용이며, 실제 가입 가능 여부·보험료·연금액은 국민연금공단의 심사와 개인별 이력에 따라 달라집니다. 본문의 계산 예시는 계산 방법을 보여주기 위한 가정값입니다.<\/div>\n<div id=\"post-byline\" style=\"border-top:1px solid #e5e7eb;margin-top:28px;padding-top:12px;font-size:13px;color:#666;line-height:1.6;\">글쓴이 <b>이상곤<\/b> · 이 글의 수치·자격·기한은 <b>공식 자료를 직접 확인<\/b>해 정리했으며, 본문에 출처와 기준일을 표기했습니다. 제도는 바뀔 수 있으니 신청 전 공식 페이지를 확인하세요. <a href=\"/p/blog-page_17.html\">정보 확인 방법·고지<\/a><\/div>\n<\/div>\n----------------------------------------------------------------\n▼ OSMU 확산용 핵심 3줄 요약 (네이버 블로그·쓰레드용)\n1. 국민연금은 만 60세면 의무가입이 끝나는데, 이때 가입기간이 10년(120개월)에 못 미치면 연금이 아니라 일시금으로 끝납니다. 60세부터 65세 전까지 본인이 원해 계속 내는 제도가 '임의계속가입'입니다.\n2. 2026년 보험료율은 9% → 9.5%로 올랐고(1998년 이후 첫 인상, 2033년 13%까지 매년 0.5%p), 임의계속가입자는 회사 부담 없이 전액 본인이 냅니다. 기준소득월액 200만 원이면 월 19만 원.\n3. 8년 가입자가 2년(24개월)을 더 채우는 경우 총 납부액이 228만~456만 원인데, 채워야 생기는 월 연금이 20만 원만 돼도 원금 회수는 11~23개월. 그 뒤는 평생 이익입니다. 단 65세가 지나면 재가입 불가, 노령연금을 청구하는 순간 자격 상실이니 순서를 먼저 정하세요(1355).\n"},{"code":"F2-11","title":"국내선 LCC 수하물 규정 총정리 — 무료 위탁·기내 반입·초과 추가요금 (제주항공 진에어 티웨이 에어부산 에어서울 2026)","lane":"pop","thumb":"126_lcc_baggage.png","draft":"국내선LCC수하물_글_HTML.txt","facts":"무료위탁 국내선: 제주항공 운임제(최저FLY 0kg/FLYBAG 15kg)·진에어15·티웨이15·에어부산15·에어서울15(정규할인특가동일). 기내반입 공통 10kg·1개·세변합115cm(제주항공40x20x55). 초과요금=온라인 사전구매<공항현장(진에어 출발24h전까지 구매·환불). 동일예약 일행 무게합산. V0=5사비교표+사전구매vs현장 계산예시3+특가0kg함정. 보조배터리 위탁금지·기내만. 관련글 F3-06/F3-07/F2-08. 출처=각 항공사 공식 수하물안내(제주항공/진에어/티웨이/에어부산/에어서울).","added":"2026-07-23","thumb_data":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAkGBwgHBgkIBwgKCgkLDRYPDQwMDRsUFRAWIB0iIiAdHx8kKDQsJCYxJx8fLT0tMTU3Ojo6Iys/RD84QzQ5Ojf/2wBDAQoKCg0MDRoPDxo3JR8lNzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzf/wAARCACIAQQDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD2qiiiqJCiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKAIbqTy4uOp4FZ9Wr4/Oo9qq1tBaDCiiiqAKKKKAHrI6jCsQKKZRRZAa1FFFc4jlPEfi19Pv/wCz9Nt1nuQQHLZIBP8ACAOprNXxT4kZto02DdtLY8ts4BwT96qXi3S77T9dk1KCJpIJX8xXC7gpPVWqjDrF2k0LvbPhI2jKopUFT90dO2BXt0sPSdOLhFPTr3NElY6rRPF082pjTdXtkgnZtqsh4DdgRzXXV5lounXmueIlvmgkigWYSyO+eMY4BPU8V6bXDjadOE0ob21RMgoooriJCiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKAKd8vKN+FVa0p4/MjK9+orOIIOD1FbQegxKKKKoAooooAKKmjt3kXcMAe9FLmQGhRRRWAgozRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFABUE9uJPmXhv51PRTTsBlujIcMpFNrVIz1ppijP8C/lVqYzNAJOAMmrMNqScycD0q2qqv3QB9BS0OfYBAMD ding:14px 20px;margin-top:22px}\n.lsg .gov b{display:block;font-size:14px;color:#1b6fc2;margin-bottom:8px}\n.lsg .gov a{display:block;color:#1b4f86;text-decoration:none;padding:6px 0;font-size:15px;font-weight:700}\n.lsg .src{background:#eef6ef;border:1px solid #cfe6d2;border-radius:12px;padding:14px 18px;margin-top:22px;font-size:14px;line-height:1.7;color:#33503a}\n.lsg .src b{display:block;font-size:14px;color:#2e7d4f;margin-bottom:6px}\n.lsg .src a{color:#1b6fc2;text-decoration:none;font-weight:600}\n.lsg .rel{background:#f4f1fd;border:1px solid #ded4f7;border-radius:12px;padding:14px 20px;margin-top:22px}\n.lsg .rel b{display:block;font-size:14px;color:#6544cc;margin-bottom:8px}\n.lsg .rel a{display:block;color:#5a3cc0;text-decoration:none;padding:5px 0;font-size:15px;font-weight:600}\n.lsg .top{display:inline-block;font-size:13px;color:#9a92aa;text-decoration:none;margin:2px 0 6px}\n<\/style>\n<div class=\"lsg\" id=\"top\">\n<span class=\"cat\">여행<\/span>\n<p>여름휴가 제주·부산행 국내선을 <b>저비용항공사(LCC)<\/b>로 싸게 끊었는데, 공항 카운터에서 <b>\"수하물 초과라 추가요금 내셔야 합니다\"<\/b>라는 말에 당황한 경험, 한 번쯤 있으실 겁니다. 특히 요즘은 <b>같은 항공사라도 운임 종류에 따라 무료로 부칠 수 있는 짐이 아예 0kg인 경우<\/b>까지 생겨서, 모르고 예약하면 <b>티켓값보다 짐값이 더 나오는<\/b> 일도 벌어집니다. 이 글에서는 국내선 5개 LCC의 <b>무료 수하물 허용량, 기내 반입 규정, 초과 시 추가요금을 아끼는 법<\/b>을 비교표와 실제 계산 예시로 정리했습니다.<\/p>\n<div class=\"toc\"><b>📑 목차<\/b><a href=\"#sec1\">1. 먼저 이 두 가지부터 — '위탁'과 '기내 반입'<\/a><a href=\"#sec2\">2. 국내선 LCC 무료 위탁 수하물 비교표<\/a><a href=\"#sec3\">3. 가장 흔한 함정 — '특가운임'은 무료 위탁이 0kg<\/a><a href=\"#sec4\">4. 기내 반입 수하물 규정 (무게·크기)<\/a><a href=\"#sec5\">5. 초과 추가요금, 얼마나 아낄 수 있나 — 계산 예시 3가지<\/a><a href=\"#sec6\">6. 이럴 때 추가요금·거절이 나옵니다<\/a><a href=\"#sec7\">7. 자주 묻는 질문<\/a><a href=\"#sec8\">공식 확인 페이지<\/a><\/div>\n<a class=\"cta\" href=\"#sec5\">👉 사전구매하면 얼마 아끼는지 계산 예시 보기<\/a>\n\n<h2 id=\"sec1\">1. 먼저 이 두 가지부터 — '위탁'과 '기내 반입'<\/h2>\n<p>수하물은 크게 두 종류로 나뉘고, 요금 규정도 완전히 다릅니다.<\/p>\n<ul>\n<li><b>위탁 수하물<\/b> = 카운터에서 부쳐 화물칸으로 가는 짐. LCC는 <b>운임에 무료 허용량이 포함되는지<\/b>가 항공사·운임별로 다릅니다.<\/li>\n<li><b>기내 반입(휴대) 수하물<\/b> = 직접 들고 타는 짐. 대부분 <b>10kg·1개<\/b>로 무료지만, <b>무게와 3면 합계 크기<\/b> 제한이 있습니다.<\/li>\n<\/ul>\n<p>핵심은 <b>\"무료 위탁은 운임에 딸려 오는 옵션\"<\/b>이라는 점입니다. 대형항공사(FSC)는 보통 운임에 넉넉히 포함돼 있지만, LCC는 <b>운임을 잘게 쪼개 팔기 때문에<\/b> 싼 운임일수록 무료 위탁이 줄거나 없어집니다. 그래서 <b>'항공권 값'만 비교하면 오히려 손해<\/b>를 볼 수 있습니다.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec2\">2. 국내선 LCC 무료 위탁 수하물 비교표<\/h2>\n<p>2026년 7월 기준, 국내선 성인 1인 <b>무료 위탁 수하물<\/b> 허용량입니다. 항공사마다 운임 체계가 달라 <b>정확한 허용량은 예약 화면의 운임 조건을 반드시 확인<\/b>해야 합니다.<\/p>\n<table>\n<tr><th>항공사<\/th><th>국내선 무료 위탁(성인)<\/th><th>기내 반입<\/th><\/tr>\n<tr><td><b>제주항공<\/b><\/td><td>운임제 — <b>최저운임(FLY)은 0kg<\/b>, 위탁 포함 운임(FLYBAG 등)은 <b>15kg<\/b><\/td><td>10kg·1개<\/td><\/tr>\n<tr><td><b>진에어<\/b><\/td><td>15kg<\/td><td>10kg·1개<\/td><\/tr>\n<tr><td><b>티웨이항공<\/b><\/td><td>15kg (운임 조건 확인)<\/td><td>10kg·1개<\/td><\/tr>\n<tr><td><b>에어부산<\/b><\/td><td>15kg<\/td><td>10kg·1개<\/td><\/tr>\n<tr><td><b>에어서울<\/b><\/td><td>15kg (정규·할인·특가 동일)<\/td><td>10kg·1개<\/td><\/tr>\n<\/table>\n<p>표에서 보이듯 대부분 <b>15kg 무료<\/b>가 기본이지만, <b>제주항공은 운임을 골라서 사는 구조<\/b>라 가장 싼 운임을 고르면 무료 위탁이 없습니다. 무게는 보통 <b>'가방 개수'가 아니라 '합산 무게'<\/b>로 봅니다. 예를 들어 15kg 허용이면 10kg 가방 + 5kg 가방으로 나눠 부쳐도 됩니다(단, 1개당 무게·규격 상한은 별도).<\/p>\n<div class=\"tip\"><b>💡 일행이면 무게를 합칠 수 있습니다<\/b><p style=\"margin:8px 0 0\">같은 <b>예약번호로 묶인 일행<\/b>은 무료 허용량을 <b>합산<\/b>해 주는 경우가 많습니다. 예컨대 2명이 각 15kg(합 30kg)이면, 한 사람 가방이 20kg이고 다른 사람이 10kg이어도 <b>합계 30kg 이내라 통과<\/b>됩니다. 짐이 한쪽에 몰리는 가족여행에 특히 유용합니다.<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec3\">3. 가장 흔한 함정 — '특가운임'은 무료 위탁이 0kg<\/h2>\n<p>요금비교 사이트나 항공사 앱에서 <b>제일 싼 운임<\/b>을 눌러 결제했다가, 공항에서 <b>짐을 통째로 유료로 부치게 되는<\/b> 경우가 여기서 나옵니다.<\/p>\n<ul>\n<li><b>제주항공 'FLY' 운임<\/b>처럼 <b>가장 저렴한 운임에는 무료 위탁이 포함되지 않습니다.<\/b> 캐리어 하나만 부쳐도 전액 추가요금입니다.<\/li>\n<li>이때 <b>항공권값 + 수하물값을 합쳐서<\/b> 다른 항공사(15kg 무료 포함)와 비교해야 실제로 뭐가 싼지 알 수 있습니다.<\/li>\n<li>짐이 <b>기내 반입 10kg 안에 들어가는 1박2일 여행<\/b>이라면, 오히려 이 최저운임이 이득일 수 있습니다. <b>내 짐 무게가 판단 기준<\/b>입니다.<\/li>\n<\/ul>\n<div class=\"warn\"><b>⚠️ '항공권만 싸게' 사면 손해 보는 순간<\/b><p style=\"margin:8px 0 0\">예: 무료 위탁 0kg 특가운임을 <b>9,900원 더 싸게<\/b> 샀는데, 20kg 캐리어를 부치느라 <b>편도 수하물 요금 2만~4만 원<\/b>을 따로 냈다면, 결과적으로 <b>더 비싸게<\/b> 여행한 셈입니다. 결제 전 <b>\"이 운임에 위탁 몇 kg 포함?\"<\/b>을 꼭 확인하세요.<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec4\">4. 기내 반입 수하물 규정 (무게·크기)<\/h2>\n<p>기내 반입은 5개 항공사가 대체로 비슷합니다. <b>무게뿐 아니라 '크기'<\/b>에서 걸리는 경우가 많으니 둘 다 확인하세요.<\/p>\n<ul>\n<li><b>무게<\/b>: 보통 <b>10kg 이하 1개<\/b> + 노트북·핸드백 같은 <b>소지품 1개<\/b>.<\/li>\n<li><b>크기<\/b>: 세 변(가로+세로+높이)의 합 <b>약 115cm 이내<\/b>(예: 제주항공 40×20×55cm). 기내용 캐리어를 살 때 이 규격을 넘지 않는지 봐야 합니다.<\/li>\n<li><b>초과 시<\/b>: 기내 반입 규정을 넘긴 가방은 <b>탑승구(게이트)에서 위탁 처리<\/b>되며 <b>추가요금<\/b>이 붙을 수 있습니다. 카운터보다 게이트에서 걸리면 더 번거롭습니다.<\/li>\n<\/ul>\n<div class=\"tip\"><b>💡 위탁 못 하는 물건, 기내만 되는 물건<\/b><p style=\"margin:8px 0 0\"><b>보조배터리·리튬배터리·전자담배<\/b>는 <b>위탁 금지, 기내 반입만<\/b> 가능합니다. 반대로 <b>물·화장품 같은 액체(100mL 초과)<\/b>는 <b>국제선은 기내 반입 제한<\/b>이 있지만 국내선은 상대적으로 완화돼 있습니다. 국내선이라도 <b>보조배터리는 부치는 짐에 넣지 마세요.<\/b><\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec5\">5. 초과 추가요금, 얼마나 아낄 수 있나 — 계산 예시 3가지<\/h2>\n<p>초과 수하물 요금의 핵심 원칙은 딱 하나입니다. <b>\"공항 현장 결제가 가장 비싸다.\"<\/b> 대부분 <b>온라인 사전구매(홈페이지·앱 '나의 예약')가 현장보다 쌉니다.<\/b> 정확한 금액은 노선·시점·항공사별로 달라 <b>예매일 기준 공식 페이지에서 확인<\/b>해야 하지만, 아끼는 구조는 아래와 같습니다.<\/p>\n<h3>예시 ① 제주항공 최저운임(FLY)로 김포–제주, 20kg 캐리어 1개<\/h3>\n<p>이 운임은 <b>무료 위탁 0kg<\/b>이라 20kg 전부가 유료입니다. 이때 <b>공항 카운터에서 즉석 결제<\/b>하면 가장 비싸고, <b>출발 전 앱에서 '수하물 사전구매'<\/b>로 미리 사두면 같은 20kg이라도 <b>더 싼 요금<\/b>이 적용됩니다. 짐이 있을 걸 안다면 <b>결제 단계에서 위탁 포함 운임을 고르는 편<\/b>이 더 저렴한 경우도 많습니다.<\/p>\n<h3>예시 ② 진에어 15kg 무료인데 22kg을 부칠 때<\/h3>\n<p>무료 15kg을 넘긴 <b>7kg만 초과분으로 유료<\/b>입니다(전체 22kg이 아니라 초과분만 과금). 이 7kg도 <b>사전구매가 현장보다 쌉니다.<\/b> 사전구매는 보통 <b>출발 몇 시간 전(예: 24시간 전)<\/b>까지 가능하고, 그 시한 안에는 취소·환불도 됩니다.<\/p>\n<h3>예시 ③ 가족 3인, 같은 예약번호로 각 15kg<\/h3>\n<p>합산 <b>45kg<\/b>까지 무료입니다. 한 명 가방이 22kg이고 나머지 둘이 각 10kg이면 합계 42kg이라 <b>추가요금 0원<\/b>. 짐을 각자 딱 맞춰 싸느라 애쓸 필요 없이 <b>한 캐리어에 몰아 담아도<\/b> 되는 이유입니다(1개당 상한 무게·규격은 확인).<\/p>\n<div class=\"tip\"><b>💡 요약하면<\/b><p style=\"margin:8px 0 0\">① <b>짐이 있으면 위탁 포함 운임<\/b>을 고르거나 ② <b>부족분은 출발 전 온라인 사전구매<\/b>, ③ <b>일행은 예약을 묶어 무게 합산<\/b> — 이 세 가지만 지켜도 공항에서 당황할 일이 크게 줄어듭니다.<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec6\">6. 이럴 때 추가요금·거절이 나옵니다<\/h2>\n<p>공항에서 실랑이가 벌어지는 전형적인 상황들입니다. 미리 알아두면 피할 수 있습니다.<\/p>\n<ul>\n<li><b>무료 위탁이 없는 특가운임<\/b>인 줄 모르고 짐을 부치는 경우 — 가장 흔합니다.<\/li>\n<li><b>기내 캐리어가 규격(3면 합 115cm)·무게 초과<\/b> — 게이트에서 위탁 전환 + 추가요금.<\/li>\n<li><b>1개당 상한 무게 초과<\/b>(보통 20~32kg) — 무료 허용량 안이어도 <b>가방 1개가 너무 무거우면<\/b> 별도 처리될 수 있습니다.<\/li>\n<li><b>골프백·자전거·악기 등 특수 수하물<\/b> — 크기·무게 규정이 별도이고 사전 신청이 필요할 수 있습니다.<\/li>\n<li><b>보조배터리를 부치는 짐에 넣음<\/b> — 보안검색에서 다시 꺼내야 해 시간을 잡아먹습니다.<\/li>\n<\/ul>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec7\">7. 자주 묻는 질문<\/h2>\n<h3>Q. 국내선인데도 무료 위탁이 0kg일 수 있나요?<\/h3>\n<p>네. <b>제주항공의 가장 저렴한 운임(FLY)<\/b>처럼 무료 위탁을 뺀 대신 운임을 낮춘 상품이 있습니다. 결제 전 <b>운임 조건에 '위탁 수하물 미포함'<\/b>이라고 적혀 있는지 확인하세요.<\/p>\n<h3>Q. 무료 15kg은 가방 1개 기준인가요, 총 무게 기준인가요?<\/h3>\n<p>대체로 <b>총 무게(합산) 기준<\/b>입니다. 15kg이면 여러 개로 나눠 부쳐도 <b>합쳐서 15kg 이내<\/b>면 됩니다. 다만 <b>가방 1개당 상한 무게·규격<\/b>은 따로 있으니 한 개에 너무 몰지는 마세요.<\/p>\n<h3>Q. 초과요금은 공항에서 내나요, 미리 내나요?<\/h3>\n<p><b>미리(온라인 사전구매) 내는 것이 거의 항상 쌉니다.<\/b> 짐이 초과될 걸 알면 출발 전 앱·홈페이지에서 미리 구매하세요. 사전구매 시한과 환불 규정은 항공사마다 다릅니다.<\/p>\n<h3>Q. 대형항공사(FSC)와 어떻게 다른가요?<\/h3>\n<p>대한항공·아시아나 같은 FSC는 국내선 무료 위탁이 <b>보통 더 넉넉<\/b>하고 운임에 포함돼 있습니다. LCC는 <b>운임을 쪼개 파는 대신 옵션을 골라 사는 구조<\/b>라, <b>짐이 적으면 LCC가, 짐이 많으면 조건에 따라 FSC가<\/b> 유리할 수 있습니다.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n\n<h2 id=\"sec8\">공식 확인 페이지<\/h2>\n<div class=\"gov\"><b>🏛️ 항공사별 수하물 규정 (공식)<\/b><a href=\"https://www.jejuair.net/ko/linkService/boardingProcessGuide/cabinBaggage.do\" target=\"_blank\" rel=\"nofollow\">▸ 제주항공 — 수하물 안내<\/a><a href=\"https://www.jinair.com/ready/carryBaggage\" target=\"_blank\" rel=\"nofollow\">▸ 진에어 — 무료 위탁/휴대 수하물<\/a><a href=\"https://www.twayair.com/app/serviceInfo/contents/148\" target=\"_blank\" rel=\"nofollow\">▸ 티웨이항공 — 무료/위탁 수하물<\/a><a href=\"https://www.airbusan.com/content/common/service/baggage/free\" target=\"_blank\" rel=\"nofollow\">▸ 에어부산 — 무료수하물<\/a><a href=\"https://flyairseoul.com\" target=\"_blank\" rel=\"nofollow\">▸ 에어서울 — 수하물 안내<\/a><\/div>\n<div class=\"end\"><b>✅ 마무리<\/b><p style=\"margin:8px 0 0\">정리하면, 국내선 LCC 무료 위탁은 <b>대체로 15kg<\/b>이지만 <b>제주항공 최저운임은 0kg<\/b>이라 운임을 고를 때 반드시 확인해야 합니다. 짐이 초과되면 <b>공항 현장보다 온라인 사전구매가 싸고<\/b>, 일행은 <b>예약을 묶어 무게를 합산<\/b>하면 됩니다. 기내 캐리어는 <b>10kg·세 변 합 115cm<\/b> 규격을 넘지 않게, <b>보조배터리는 반드시 기내로<\/b>. 이번 여름 제주·부산 여행, 짐값으로 손해 보지 말고 떠나세요.<\/p><\/div>\n<div class=\"src\"><b>📌 정보 기준 · 출처<\/b>이 글은 <b style=\"display:inline;color:#33503a;margin:0\">2026년 7월<\/b> 기준이며, 무료 허용량·초과요금·사전구매 시한은 항공사 정책과 운임 상품에 따라 수시로 달라질 수 있습니다. 예매·탑승 전 아래 각 항공사 공식 수하물 안내와 <b>내 운임의 조건<\/b>을 반드시 확인하세요.<br>출처: 제주항공·진에어·티웨이항공·에어부산·에어서울 공식 수하물 안내 페이지<\/div>\n<div class=\"rel\"><b>🔗 함께 보면 좋은 글<\/b><a href=\"https://lifeinfo8975.blogspot.com/2026/07/2026-7-8-24200.html\">▸ 여름 항공권 싸게 사는 법 + 유류할증료 총정리<\/a><a href=\"https://lifeinfo8975.blogspot.com/2026/07/2026_0459503221.html\">▸ 항공기 결항·지연 보상 신청 방법 총정리<\/a><a href=\"https://lifeinfo8975.blogspot.com/2026/06/2026_0230556349.html\">▸ 제주 렌터카 싸게 예약하는 법 + 자차보험 총정리<\/a><\/div>\n<div id=\"post-byline\" style=\"border-top:1px solid #e5e7eb;margin-top:28px;padding-top:12px;font-size:13px;color:#666;line-height:1.6;\">글쓴이 <b>이상곤<\/b> · 이 글의 수하물 허용량·요금·규격은 <b>각 항공사 공식 안내를 직접 확인<\/b>해 정리했으며, 본문에 출처와 기준일을 표기했습니다. 항공사 정책은 바뀔 수 있으니 예매 전 공식 페이지와 내 운임 조건을 확인하세요. <a href=\"/p/blog-page_17.html\">정보 확인 방법·고지<\/a><\/div>\n<\/div>\n----------------------------------------------------------------\n▼ OSMU 확산용 핵심 3줄 요약 (네이버 블로그·쓰레드용)\n1. 국내선 LCC 무료 위탁은 대체로 15kg인데, 제주항공 최저운임(FLY)은 무료 위탁이 0kg이에요. 제일 싼 운임만 눌러 사면 캐리어 하나 부치는 데 짐값이 따로 나와, 항공권값+짐값을 합쳐 비교해야 진짜 싼 게 보입니다.\n2. 초과요금은 공항 현장 결제가 제일 비싸요. 출발 전 앱·홈페이지 '나의 예약'에서 수하물 사전구매를 하면 같은 무게라도 더 쌉니다(보통 출발 24시간 전까지, 환불도 가능).\n3. 일행은 같은 예약번호로 묶으면 무게 합산이 돼요(각 15kg=합 30kg). 기내 캐리어는 10kg·세 변 합 115cm 규격, 보조배터리는 위탁 금지·기내만. 짐 무게로 항공사를 고르면 손해를 막습니다.\n"},{"code":"B3-04","title":"퇴직연금 er-radius:12px;padding:14px 20px;margin:16px 0}\n.lsg .end{background:#fff8e6;border:1px solid #ffe2a8;border-radius:12px;padding:16px 20px;margin-top:24px}\n.lsg .gov{background:#eef4fc;border:1px solid #c8ddf3;border-radius:12px;padding:14px 20px;margin-top:22px}\n.lsg .gov b{display:block;font-size:14px;color:#1b6fc2;margin-bottom:8px}\n.lsg .gov a{display:block;color:#1b4f86;text-decoration:none;padding:6px 0;font-size:15px;font-weight:700}\n.lsg .src{background:#eef6fc;border:1px solid #cfe4f5;border-radius:12px;padding:14px 18px;margin-top:22px;font-size:14px;line-height:1.7;color:#2c4a63}\n.lsg .src b{display:block;font-size:14px;color:#215d94;margin-bottom:6px}\n.lsg .src a{color:#1b6fc2;text-decoration:none;font-weight:600}\n.lsg .rel{background:#eef6fc;border:1px solid #cfe4f5;border-radius:12px;padding:14px 20px;margin-top:22px}\n.lsg .rel b{display:block;font-size:14px;color:#2a72b5;margin-bottom:8px}\n.lsg .rel a{display:block;color:#215d94;text-decoration:none;padding:5px 0;font-size:15px;font-weight:600}\n.lsg .top{display:inline-block;font-size:13px;color:#8a9aa8;text-decoration:none;margin:2px 0 6px}\n<\/style>\n<div class=\"lsg\" id=\"top\">\n<span class=\"cat\">세금·금융<\/span>\n<p>퇴직할 때 IRP(개인형 퇴직연금)에 쌓인 돈, <b>한 번에 받을까 나눠 받을까?<\/b> 이 선택 하나로 세금이 <b>수백만 원<\/b> 갈립니다. 핵심은 간단합니다. 퇴직금을 <b>연금으로 나눠 받으면 퇴직소득세를 30~40% 깎아주고<\/b>, 연금저축·IRP에 내가 넣은 돈은 <b>낮은 연금소득세(3.3~5.5%)<\/b>로 바뀝니다. 다만 <b>'연 1,500만 원'이라는 함정<\/b>과 '중도 해지 불이익'을 모르면 오히려 세금을 더 냅니다. 아래에서 재원별 과세·세율·계산 예시까지 한 번에 정리했습니다.<\/p>\n<div class=\"toc\"><b>📑 목차<\/b><a href=\"#sec1\">1. 연금으로 받으려면? 수령 조건(만 55세·5년)<\/a><a href=\"#sec2\">2. 내 IRP는 3가지 돈이 섞여 있다 (재원별 과세)<\/a><a href=\"#sec3\">3. 나이별 연금소득세율·퇴직소득세 감면율<\/a><a href=\"#sec4\">4. 계산 예시 ① 퇴직금 연금 vs 일시금 (600만 원 차이)<\/a><a href=\"#sec5\">5. 계산 예시 ② '연 1,500만 원' 함정 피하기<\/a><a href=\"#sec6\">6. 중도 해지·55세 전 인출하면 손해<\/a><a href=\"#sec7\">7. 자주 묻는 질문<\/a><a href=\"#sec8\">공식 확인 페이지<\/a><\/div>\n<a class=\"cta\" href=\"https://100lifeplan.fss.or.kr\" target=\"_blank\" rel=\"nofollow\">👉 금융감독원 통합연금포털에서 내 연금 조회하기<\/a>\n<h2 id=\"sec1\">1. 연금으로 받으려면? 수령 조건<\/h2>\n<p>IRP에 쌓인 돈을 '연금'으로 받으려면 아래 요건을 모두 채워야 합니다. 하나라도 못 채우면 '일시금'으로 간주돼 세금 혜택이 사라집니다.<\/p>\n<ul>\n<li><b>만 55세 이상<\/b>일 것.<\/li>\n<li>연금계좌 <b>가입 후 5년 이상<\/b> 경과했을 것. <b>단, 퇴직금(이연퇴직소득)이 입금된 IRP는 이 5년 요건이 면제<\/b>됩니다. 즉 퇴직해서 받은 퇴직금은 55세만 넘으면 바로 연금으로 받을 수 있습니다.<\/li>\n<li>수령 기간을 <b>10년 이상<\/b>으로 잡고, 매년 정해진 <b>'연금수령한도' 안에서<\/b> 나눠 받을 것.<\/li>\n<\/ul>\n<div class=\"tip\"><b>💡 '연금수령한도'가 뭔가요?<\/b><p style=\"margin:8px 0 0\">한 해에 세제 혜택을 받으며 꺼낼 수 있는 상한선입니다. <b>연금수령한도 = 연금계좌 평가액 ÷ (11 − 연금수령연차) × 120%<\/b>. 이 한도를 넘겨 인출하면, <b>초과분은 연금이 아니라 일시금으로 과세<\/b>돼 감면 혜택이 날아갑니다. 그래서 '10년 이상 천천히'가 세금상 유리합니다.<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec2\">2. 내 IRP는 3가지 돈이 섞여 있다<\/h2>\n<p>세금이 헷갈리는 이유는, IRP 한 계좌 안에 <b>성격이 다른 세 종류의 돈<\/b>이 섞여 있고 <b>각각 세금이 다르게<\/b> 매겨지기 때문입니다. 이걸 구분하는 게 절세의 출발점입니다.<\/p>\n<table>\n<tr><th>재원(돈의 종류)<\/th><th>연금으로 받을 때<\/th><th>일시금으로 받을 때<\/th><\/tr>\n<tr><td><b>① 퇴직금<\/b><br>(이연퇴직소득)<\/td><td>연금소득세<br>=퇴직소득세 <b>30~40% 감면<\/b><\/td><td>퇴직소득세<br>(감면 없음)<\/td><\/tr>\n<tr><td><b>② 내가 넣은 돈<\/b><br>(세액공제 받은 자기부담금)<\/td><td>연금소득세<br><b>3.3~5.5%<\/b> 저율<\/td><td>기타소득세<br><b>16.5%<\/b><\/td><\/tr>\n<tr><td><b>③ 굴려서 번 돈<\/b><br>(운용수익)<\/td><td>연금소득세<br><b>3.3~5.5%<\/b> 저율<\/td><td>기타소득세<br><b>16.5%<\/b><\/td><\/tr>\n<\/table>\n<p>표에서 보듯 <b>어떻게 받든 연금이 일시금보다 세금이 낮습니다.<\/b> 특히 ②·③(내가 넣은 돈+수익)은 일시금이면 16.5%를 떼지만, 연금이면 3.3~5.5%로 <b>3분의 1 수준<\/b>으로 내려갑니다.<\/p>\n<div class=\"tip\"><b>💡 꼭 기억할 '한도'의 진실<\/b><p style=\"margin:8px 0 0\">뒤에 나오는 <b>'연 1,500만 원' 한도는 ②·③(내가 넣은 돈+수익)에만<\/b> 적용됩니다. <b>①퇴직금(이연퇴직소득)은 금액이 아무리 커도 이 한도와 무관<\/b>하게 항상 저율 분리과세로 끝납니다. 이걸 헷갈려 '퇴직금 연금으로 많이 받으면 세금폭탄'이라 오해하는 경우가 많은데, 아닙니다.<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec3\">3. 나이별 연금소득세율·퇴직소득세 감면율<\/h2>\n<p><b>②내가 넣은 돈 + ③운용수익<\/b>을 연금으로 받을 때는, 받는 <b>나이가 많을수록 세율이 낮아집니다<\/b>(지방소득세 포함).<\/p>\n<table>\n<tr><th>연금 받는 나이<\/th><th>연금소득세율(지방세 포함)<\/th><\/tr>\n<tr><td>만 55세~69세<\/td><td>5.5%<\/td><\/tr>\n<tr><td>만 70세~79세<\/td><td>4.4%<\/td><\/tr>\n<tr><td>만 80세 이상<\/td><td>3.3%<\/td><\/tr>\n<\/table>\n<p>사망 시까지 받는 <b>종신형<\/b>으로 설계하면 이보다 더 낮은 세율(2026년부터 3.3%)이 적용됩니다. 한편 <b>①퇴직금(이연퇴직소득)<\/b>을 연금으로 받을 때는 나이가 아니라 <b>수령 연차<\/b>에 따라 원래 낼 퇴직소득세를 깎아줍니다.<\/p>\n<table>\n<tr><th>연금 수령 기간<\/th><th>퇴직소득세 감면<\/th><th>실제 부담<\/th><\/tr>\n<tr><td>연금수령 <b>10년 이내<\/b><\/td><td><b>30% 감면<\/b><\/td><td>퇴직소득세의 70%<\/td><\/tr>\n<tr><td>연금수령 <b>11년차부터<\/b><\/td><td><b>40% 감면<\/b><\/td><td>퇴직소득세의 60%<\/td><\/tr>\n<\/table>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec4\">4. 계산 예시 ① 퇴직금 연금 vs 일시금<\/h2>\n<p>말로만 하면 와닿지 않으니 숫자로 봅시다. <b>퇴직금 2억 원<\/b>이 IRP에 입금됐고, 이 퇴직금에 대해 계산된 <b>퇴직소득세가 2,000만 원<\/b>(실효세율 10%)이라고 가정합니다.<\/p>\n<table>\n<tr><th>구분<\/th><th>일시금 수령<\/th><th>연금 수령(10년 분할)<\/th><\/tr>\n<tr><td>매년 받는 돈<\/td><td>2억 원(한 번에)<\/td><td>2,000만 원 × 10년<\/td><\/tr>\n<tr><td>적용 세율<\/td><td>퇴직소득세 10%<\/td><td>10% × 70% = <b>7%<\/b><\/td><\/tr>\n<tr><td>총 세금<\/td><td><b>2,000만 원<\/b><\/td><td>140만 원 × 10년 = <b>1,400만 원<\/b><\/td><\/tr>\n<tr><td>세금 차이<\/td><td colspan=\"2\" style=\"background:#fff8e6\"><b>연금 수령이 600만 원 절약<\/b> (11년차부터는 40% 감면이라 더 유리)<\/td><\/tr>\n<\/table>\n<p>핵심은 이 퇴직금 연금은 <b>연 2,000만 원<\/b>씩 받아도 '1,500만 원 한도'에 <b>걸리지 않는다<\/b>는 점입니다(①재원이라 한도 무관). 종합과세로 넘어가지 않고 저율 감면이 그대로 유지됩니다.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec5\">5. 계산 예시 ② '연 1,500만 원' 함정 피하기<\/h2>\n<p>반대로 조심할 대상은 <b>②내가 넣은 돈 + ③운용수익<\/b>입니다. 이 둘을 연금으로 받은 금액이 <b>연간 1,500만 원을 넘으면<\/b>, 넘은 부분만이 아니라 <b>그해 받은 전액<\/b>에 대해 ⓐ다른 소득과 합쳐 <b>종합과세<\/b> 하거나 ⓑ<b>16.5% 분리과세<\/b> 중 하나를 골라야 합니다. 저율(5.5%)이 사라지는 것이죠.<\/p>\n<table>\n<tr><th>②+③ 연간 연금 수령액<\/th><th>과세 방식<\/th><\/tr>\n<tr><td>연 1,500만 원 <b>이하<\/b><\/td><td>저율 분리과세 <b>3.3~5.5%<\/b> (신고 끝)<\/td><\/tr>\n<tr><td>연 1,500만 원 <b>초과<\/b><\/td><td>전액 <b>종합과세<\/b> 또는 <b>16.5% 분리과세<\/b> 선택<\/td><\/tr>\n<\/table>\n<div class=\"tip\"><b>💡 함정을 피하는 방법<\/b><p style=\"margin:8px 0 0\">②+③에서 나오는 연금을 <b>매년 1,500만 원 이하로 쪼개서<\/b> 오래 받으면 계속 저율(5.5%)을 유지할 수 있습니다. 예를 들어 자기부담금·수익이 3,000만 원 있다면 한 해에 몰아 받지 말고 <b>2년에 걸쳐 1,500만 원씩<\/b> 받는 식입니다. ※ 이 1,500만 원 계산에 <b>①퇴직금 연금과 국민연금 등 공적연금은 포함되지 않습니다.<\/b><\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec6\">6. 중도 해지·55세 전 인출하면 손해<\/h2>\n<p>급하다고 55세 전에 IRP를 깨거나 중도 해지하면, 그동안 받은 세제 혜택을 <b>토해내는 구조<\/b>라 손해가 큽니다. 이때도 재원별로 세금이 다릅니다.<\/p>\n<ul>\n<li><b>②내가 넣은 돈 + ③운용수익<\/b> → <b>기타소득세 16.5%<\/b>. 매년 세액공제로 돌려받은 세금을 다시 물어내는 성격이라, 저율 연금(5.5%)의 <b>3배<\/b>를 뗍니다.<\/li>\n<li><b>①퇴직금(이연퇴직소득)<\/b> → <b>퇴직소득세<\/b>가 그대로(감면 없이) 부과됩니다. 연금이었다면 받을 30~40% 감면을 못 받습니다.<\/li>\n<\/ul>\n<p>또 앞서 본 <b>연금수령한도를 초과<\/b>해 꺼낸 금액도 '연금이 아닌 것'으로 보아 같은 방식으로 과세됩니다. 결론은 <b>55세 이후 · 한도 안에서 · 10년 이상<\/b>이 삼박자입니다.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec7\">7. 자주 묻는 질문<\/h2>\n<h3>Q. 퇴직금은 무조건 연금으로 받는 게 이득인가요?<\/h3>\n<p>세금만 보면 연금이 유리합니다(퇴직소득세 30~40% 감면 + 과세이연). 다만 목돈이 당장 필요하거나 대출 상환 등 확정 지출이 있다면 일시금이 나을 수 있습니다. '세금 절약분'과 '목돈의 활용 가치'를 비교해 정하세요.<\/p>\n<h3>Q. 국민연금이랑 IRP 연금을 같이 받으면 세금이 합쳐지나요?<\/h3>\n<p>국민연금(공적연금)과 사적연금(IRP·연금저축)은 <b>과세 체계가 분리<\/b>돼 있습니다. IRP의 ②+③ '연 1,500만 원' 한도 계산에 국민연금은 들어가지 않습니다. 국민연금은 별도로 공적연금 과세 방식(연말정산)을 따릅니다.<\/p>\n<h3>Q. 회사 다닐 때 DB·DC형이었는데 IRP로 옮겨야 하나요?<\/h3>\n<p>퇴직하면 퇴직급여가 IRP 계좌로 이전되는 것이 원칙입니다. IRP로 받아 두면 당장 퇴직소득세를 떼지 않고 <b>과세가 미뤄지며(과세이연)<\/b>, 나중에 연금으로 받을 때 감면까지 받을 수 있어 유리합니다.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec8\">공식 확인 페이지<\/h2>\n<div class=\"gov\"><b>🏛️ 공식 안내 바로가기<\/b><a href=\"https://www.nts.go.kr/nts/cm/cntnts/cntntsView.do?mi=6608&cntntsId=7888\" target=\"_blank\" rel=\"nofollow\">▸ 국세청 — 연금소득 원천징수(세율)<\/a><a href=\"https://100lifeplan.fss.or.kr\" target=\"_blank\" rel=\"nofollow\">▸ 금융감독원 통합연금포털 — 내 연금 조회<\/a><\/div>\n<div class=\"end\"><b>✅ 마무리<\/b><p style=\"margin:8px 0 0\">IRP 수령의 절세 공식은 <b>①퇴직금은 연금으로(30~40% 감면), ②+③내가 넣은 돈은 연 1,500만 원 이하로 나눠(저율 5.5%), ③55세 이후 10년 이상<\/b>입니다. 급하게 일시금·중도해지하면 16.5%를 물게 되니, 받기 전 <b>금융감독원 통합연금포털<\/b>에서 내 계좌 재원 구성부터 확인해 보세요.<\/p><\/div>\n<div class=\"src\"><b>📌 정보 기준 · 출처<\/b>이 글은 <b style=\"display:inline;color:#2c4a63;margin:0\">2026년 7월<\/b> 기준이며, 세율·한도·감면율은 세법 개정에 따라 바뀔 수 있습니다. 실제 수령·신고 전 국세청 또는 금융회사에서 최신 기준과 내 계좌 재원 구성을 확인하세요.<br>출처: 국세청 연금소득 원천징수 안내(nts.go.kr), 금융감독원 통합연금포털(100lifeplan.fss.or.kr), 소득세법<\/div>\n<div class=\"rel\"><b>🔗 함께 보면 좋은 글<\/b><a href=\"https://lifeinfo8975.blogspot.com/2026/06/irp-900-2026.html\">▸ 연금저축 IRP 세액공제 한도 900만원 연말정산 환급 총정리 (2026)<\/a><a href=\"https://lifeinfo8975.blogspot.com/2026/07/2026_01894976254.html\">▸ 퇴직금 계산 방법 퇴직소득세 지급기한 중간정산 총정리 (2026)<\/a><a href=\"https://lifeinfo8975.blogspot.com/2026/07/2026_01191203420.html\">▸ 국민연금 조기노령연금 연기연금 신청 방법 감액률 증액률 손익분기 총정리 (2026)<\/a><\/div>\n\n<div id=\"ymyl-disclaimer\" style=\"margin-top:22px;font-size:13px;color:#666;line-height:1.6\">본 글은 정보 제공용이며 투자·세무·금융 자문이 아닙니다. 개별 세액·과세 판단은 국세청 및 금융회사의 판단에 따릅니다.<\/div>\n<div id=\"post-byline\" style=\"border-top:1px solid #e5e7eb;margin-top:28px;padding-top:12px;font-size:13px;color:#666;line-height:1.6;\">글쓴이 <b>이상곤<\/b> · 이 글의 세율·한도·감면율은 <b>공식 자료를 직접 확인<\/b>해 정리했으며, 본문에 출처와 기준일을 표기했습니다. 제도는 바뀔 수 있으니 수령 전 공식 페이지를 확인하세요. <a href=\"/p/blog-page_17.html\">정보 확인 방법·고지<\/a><\/div>\n<\/div>\n----------------------------------------------------------------\n▼ OSMU 확산용 핵심 3줄 요약 (네이버 블로그·쓰레드용)\n1. 퇴직할 때 IRP 돈, 한 번에 받을까 나눠 받을까? 이 선택 하나로 세금이 수백만 원 갈립니다. 핵심은 '퇴직금은 연금으로 나눠 받으면 퇴직소득세를 30~40% 깎아준다'는 것.\n2. IRP엔 세 종류 돈이 섞여 있어요. ①퇴직금(연금으로 받으면 30~40% 감면) ②내가 넣은 돈+③수익(연금이면 3.3~5.5%, 일시금이면 16.5%). 어떻게든 연금이 세금이 쌉니다.\n3. 함정은 '연 1,500만 원'. ②+③을 한 해 1,500만 원 넘게 받으면 전액 종합과세되니 쪼개 받으세요. 단 ①퇴직금과 국민연금은 이 한도와 무관! 55세 이후·10년 이상이 절세 삼박자.\n"}]},"db":{"version":1,"updated":"2026-07-24","root":"lifeinfo","blog":"https://lifeinfo8975.blogspot.com/","taxonomy":[{"code":"A","name":"정부지원·복지","color":"#2BC4B0","subs":[{"code":"A1","name":"지원금·수당"},{"code":"A2","name":"생계·바우처 지원"},{"code":"A5","name":"근로·구직 지원"},{"code":"A3","name":"연금·노후"},{"code":"A4","name":"위기·재난 지원"}]},{"code":"B","name":"세금·금융","color":"#4D9DE0","subs":[{"code":"B1","name"   if(collab&&collab.uncommitted>=10) adv.push('미커밋 '+collab.uncommitted+'파일 — 발행 완료 후 세션별 커밋 분리 권장.');
  const adviceHtml=adv.length?'<div class="advice">'+adv.map(t=>'<div class="ai"><span class="ic">💡</span><span>'+esc(t)+'</span></div>').join('')+'</div>':'<div class="pcode none">현재 조치 필요 항목 없음</div>';
  // 📋 미결 관리 — 글별(pending.json: DB osmu + index_status에서 계산)
  const pc=(pend&&pend.counts)||{};
  const cb=(ok,l)=>'<span class="ch '+(ok?'on':'off')+'">'+l+(ok?'✓':'✗')+'</span>';
  const pendRows=(pend&&pend.actionable||[]).map(a=>{
    const c=a.ch||{};
    return '<div class="prow"><span class="pcd">'+esc(a.code)+'</span><span class="ptt">'+esc(a.title)+'</span>'
    +cb(c.g!==false,'G')+cb(c.n,'N')+cb(c.t,'T')+'</div>';
  }).join('');
  // 표시는 상위 14편으로 잘려 있음(pending.py) → 남은 수는 counts로 계산해 "…외 N편"
  const pendListed=(pend&&pend.actionable||[]).length;
  const pendTotal=Math.max(pc.osmu_pending||0,pc.index_pending||0);
  const pendMore=pendTotal>pendListed?'<div class="cnt">…외 '+(pendTotal-pendListed)+'편</div>':'';
  const pendHtml='<div class="cnt">OSMU 대기 '+(pc.osmu_pending||0)+'편 · 색인 대기 '+(pc.index_pending||0)+'편 / 전체 '+(pc.total||0)+'편</div>'+(pendRows||'<div class="pcode none">미결 없음</div>')+pendMore;
  // 📋 발행 대기 (발행 전 큐 — queue.json) : 코드·제목·썸네일을 한 카드로 묶어 '엉뚱한 글/썸네일' 눈으로 차단
  const qItems=(queue&&queue.items)||[];
  const laneLab={info:'정보성',pop:'대중관심'};
  const qCards=qItems.map(it=>{
    const th=it.thumb_data
      ?'<img class="qth" src="'+it.thumb_data+'" alt="">'
      :'<div class="qth none">썸네일<br>없음</div>';
    const facts=it.facts?'<div class="qfacts">'+esc(it.facts)+'</div>':'';
    const draft=it.draft?'<span class="qdraft">📄 '+esc(it.draft)+'</span>':'';
    const pv=it.body?'<button class="qpv" onclick="qpv(\''+esc(it.code||'')+'\')">👁 본문 미리보기</button>'
                    :'<span class="qpv none">초안 없음(작성 전)</span>';
    return '<div class="qcard">'+th
      +'<div class="qbody"><div class="qtop"><span class="qcode">'+esc(it.code||'')+'</span>'
      +'<span class="qlane '+(it.lane||'info')+'">'+esc(laneLab[it.lane]||it.lane||'')+'</span></div>'
      +'<div class="qtitle">'+esc(it.title||'')+'</div>'+facts
      +'<div class="qmeta">'+pv+draft+'</div></div></div>';
  }).join('');
  const qHtml=qItems.length
    ?'<div class="cnt">발행 대기 '+qItems.length+'건 — 발행하면 카드가 자동으로 사라집니다(사람 승인 게이트)</div>'+qCards
    :'<div class="pcode none">발행 대기 없음 — PREP 루틴이 준비하면 여기 카드로 뜹니다</div>';
  document.getElementById('board').innerHTML=
   '<div class="hd"><div class="t"><h1>진행현황</h1><span class="date">'+esc(date)+'</span></div>'
   +'<span class="badge '+bcls+'">'+CHECK+esc(blab)+'</span></div>'
   +'<div class="sec">오늘 한 일</div>'+today
   +'<div class="metrics">'
   +'<div class="m"><div class="l">검사 통과</div><div class="v">'+pass+' <small>/ '+total+'</small></div></div>'
   +'<div class="m"><div class="l">블로그 글</div><div class="v">'+count+' <small>편</small></div></div>'
   +'<div class="m"><div class="l">평균 본문</div><div class="v">'+avg+' <small>자</small></div></div>'
   +'</div>'
   +'<div class="div"></div>'
   +'<div class="sec">📋 발행 대기 (오늘 발행할 글)<span class="auto">🤖 PREP 큐</span></div>'+qHtml
   +'<div class="div"></div>'
   +'<div class="sec">발행 진행 (글 1편 · '+STEPS.length+'단계, 확산 포함)<span class="auto">🤖 자동</span></div>'+pubHtml
   +'<div class="div"></div>'
   +'<div class="sec">📡 3채널 발행 현황 (구글·네이버·쓰레드)<span class="auto">🤖 DB 자동집계</span></div>'
   +'<div class="metrics">'
   +'<div class="m"><div class="l">구글(원본)</div><div class="v">'+count+' <small>편</small></div></div>'
   +'<div class="m"><div class="l">네이버</div><div class="v">'+oNv+' <small>편</small></div></div>'
   +'<div class="m"><div class="l">쓰레드</div><div class="v">'+oTh+' <small>편</small></div></div>'
   +'</div>'
   +'<div class="cnt">확산 커버리지 · 네이버 '+(count?Math.round(oNv/count*100):0)+'% · 쓰레드 '+(count?Math.round(oTh/count*100):0)+'% · 교차링크 완료 '+omAll.length+'편</div>'
   +osmuLi
   +'<div class="div"></div>'
   +'<div class="sec">🤝 협업 — 세션별 역할·진행<span class="auto">git 자동분류</span></div>'+collabHtml
   +'<div class="sec">💡 시스템 조언<span class="auto">라이브 도출</span></div>'+adviceHtml
   +'<div class="div"></div>'
   +'<div class="sec">📋 미결 관리 — 3채널 매칭<span class="auto">G구글·N네이버·T쓰레드</span></div>'+pendHtml
   +'<div class="sec">다음</div><div class="next">'+next+'</div>'
   +'<div class="upd" id="upd"></div>';
  tick();
}
// 시계·데이터 기준만 갱신(보드 전체 재렌더 없음 — 정적 베이크 데이터라 시계만 변함)
function tick(){
  const el=document.getElementById('upd'); if(!el)return;
  const b=(window.__DATA__||{}).baked_at;
  el.textContent=(b?'데이터 기준 '+b+' · ':'')+new Date().toLocaleTimeString('ko-KR');
}
// 👁 발행 대기 카드 본문 미리보기 — 초안 HTML을 격리 iframe(srcdoc)로 렌더(스타일 누수 차단, Blogger 미접촉)
function qpv(code){
  const items=((window.__DATA__||{}).queue||{}).items||[];
  const it=items.find(x=>x.code===code); if(!it||!it.body)return;
  document.getElementById('qpv-ttl').textContent=(it.code||'')+' · '+(it.title||'');
  document.getElementById('qpv-fr').srcdoc='<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><base target="_blank"><body style="margin:0;padding:16px;background:#fff">'+it.body+'</body>';
  document.getElementById('qpv-ov').classList.add('show');
}
function qpvClose(){document.getElementById('qpv-ov').classList.remove('show');document.getElementById('qpv-fr').srcdoc='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')qpvClose();});
// 코드 자동 반영: 자기 자신(progress.html)을 주기적으로 fetch→해시 비교, 바뀌면 1회 reload
const _hash=s=>{let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return h;};
let _selfHash=null;
async function checkVersion(){
  try{
    const r=await fetch('progress.html?'+Date.now(),{cache:'no-store'});
    if(!r.ok)return;                                // 일시적 404/500에 해시 오염 → 불필요 reload 방지
    const t=await r.text();
    const h=_hash(t);
    if(_selfHash===null){_selfHash=h;return;}      // 첫 호출=기준선 저장
    if(h!==_selfHash) location.reload();            // 코드 변경 감지 → 자동 새로고침
  }catch(e){}
}
load(); checkVersion(); setInterval(tick,5000); setInterval(checkVersion,5000);
</script>
