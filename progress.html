html,body{background:var(--bg)}
body{color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR','Malgun Gothic',sans-serif;padding:12px;font-size:14px;-webkit-font-smoothing:antialiased}

.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.hd .t{display:flex;align-items:center;gap:8px}
.hd h1{font-size:16px;font-weight:600}
.date{font-size:12px;color:var(--mut);font-weight:400}
.badge{font-size:12px;font-weight:500;padding:4px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:5px}

.row.done svg{color:var(--ok)}
.row.warn svg{color:var(--warn)}

.metrics{display:flex;gap:7px;margin:11px 0 2px}
.m{flex:1;background:var(--card2);border-radius:9px;padding:8px 10px}
.m .l{font-size:11px;color:var(--mut)}

.div{border-top:1px solid var(--line);margin:13px 0 2px}

.bar{height:8px;background:#0b1322;border-radius:6px;overflow:hidden;margin:0 0 4px}

ul{list-style:none}

:700}\n.lsg .src{background:#eef6fc;border:1px solid #cfe4f5;border-radius:12px;padding:14px 18px;margin-top:22px;font-size:14px;line-height:1.7;color:#2c4a63}\n.lsg .src b{display:block;font-size:14px;color:#215d94;margin-bottom:6px}\n.lsg .src a{color:#1b6fc2;text-decoration:none;font-weight:600}\n.lsg .rel{background:#eef6fc;border:1px solid #cfe4f5;border-radius:12px;padding:14px 20px;margin-top:22px}\n.lsg .rel b{display:block;font-size:14px;color:#2a72b5;margin-bottom:8px}\n.lsg .rel a{display:block;color:#215d94;text-decoration:none;padding:5px 0;font-size:15px;font-weight:600}\n.lsg .top{display:inline-block;font-size:13px;color:#8a9aa8;text-decoration:none;margin:2px 0 6px}\n<\/style>\n<div class=\"lsg\" id=\"top\">\n<span class=\"cat\">세금·금융<\/span>\n<p>매년 12월이면 날아오는 종합부동산세 고지서. 이름만 들어도 부담스럽지만, <b>실제로는 대부분의 1주택자가 한 푼도 내지 않습니다.<\/b> 1세대 1주택자는 공시가격 <b>12억원까지 공제<\/b>되기 때문입니다. 내가 종부세 대상인지 궁금하다면, 아래에서 과세대상·공제금액·세율·세액공제·납부방법까지 확인하고 <b>홈택스 모의계산<\/b>으로 내 세액을 직접 확인해 보세요.<\/p>\n<div class=\"toc\"><b>📑 목차<\/b><a href=\"#sec1\">1. 종부세란? 과세대상·과세기준일<\/a><a href=\"#sec2\">2. 기본공제·과세표준 계산법<\/a><a href=\"#sec3\">3. 세율 (2주택 이하·3주택 이상)<\/a><a href=\"#sec4\">4. 1세대 1주택 세액공제·부부공동명의 특례<\/a><a href=\"#sec5\">5. 납부기간·분납·납부방법<\/a><a href=\"#sec6\">6. 자주 묻는 질문<\/a><a href=\"#sec7\">공식 확인 페이지<\/a><\/div>\n<a class=\"cta\" href=\"https://hometax.go.kr/websquare/websquare.html?w2xPath=/ui/pp/index_pp.xml&tmIdx=41&tm2lIdx=4113000000&tm3lIdx=4113030000\" target=\"_blank\" rel=\"nofollow\">👉 홈택스 종부세 모의계산으로 내 세액 확인하기<\/a>\n<h2 id=\"sec1\">1. 종부세란? 과세대상·과세기준일<\/h2>\n<p>종합부동산세는 전국에 보유한 부동산 공시가격을 <b>사람별로 합산<\/b>해 일정 기준을 넘으면 부과되는 <b>국세<\/b>입니다. 지방자치단체가 매기는 재산세와 별개로, 재산세를 먼저 낸 뒤 기준 초과분에 추가로 부과됩니다.<\/p>\n<ul>\n<li><b>과세기준일<\/b>: 매년 <b>6월 1일<\/b> 현재 보유한 부동산 기준(6월 2일 이후 팔아도 그해 종부세는 6월 1일 소유자가 부담).<\/li>\n<li><b>과세대상<\/b>: ① 주택(부속토지 포함) ② 종합합산토지(나대지·잡종지 등) ③ 별도합산토지(상가·사무실 부속토지 등).<\/li>\n<li><b>납세의무자<\/b>: 위 유형별로 공시가격 합계가 공제금액을 초과하는 소유자.<\/li>\n<\/ul>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec2\">2. 기본공제·과세표준 계산법<\/h2>\n<p>유형별로 공시가격 합계에서 아래 <b>기본공제금액<\/b>을 뺀 뒤, <b>공정시장가액비율<\/b>을 곱해 과세표준을 구합니다.<\/p>\n<table>\n<tr><th>과세대상<\/th><th>기본공제금액<\/th><th>공정시장가액비율<\/th><\/tr>\n<tr><td>주택 (일반)<\/td><td>9억원<\/td><td>60%<\/td><\/tr>\n<tr><td>주택 (1세대 1주택자)<\/td><td><b>12억원<\/b><\/td><td>60%<\/td><\/tr>\n<tr><td>종합합산토지<\/td><td>5억원<\/td><td>100%<\/td><\/tr>\n<tr><td>별도합산토지<\/td><td>80억원<\/td><td>100%<\/td><\/tr>\n<\/table>\n<div class=\"tip\"><b>💡 과세표준 계산식(주택)<\/b><p style=\"margin:8px 0 0\">과세표준 = (인별 공시가격 합계 − 기본공제 12억원) × 60%<br>예) 1세대 1주택자 공시가격 15억원이면 → (15억 − 12억) × 60% = <b>과세표준 1억 8천만원<\/b>. 여기에 세율을 적용해 산출세액을 계산하고, 이미 낸 재산세 중 겹치는 부분과 세액공제를 뺍니다.<\/p><\/div>\n<p>공시가격이 <b>공제금액 이하<\/b>면 과세표준이 0이 되어 종부세가 나오지 않습니다. 1주택자 다수가 여기에 해당합니다.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec3\">3. 세율 (2주택 이하·3주택 이상)<\/h2>\n<p>주택분 종부세는 과세표준 구간별 <b>누진세율<\/b>이며, 보유 주택 수에 따라 세율이 달라집니다(2023년 이후).<\/p>\n<table>\n<tr><th>과세표준<\/th><th>2주택 이하<\/th><th>3주택 이상<\/th><\/tr>\n<tr><td>3억원 이하<\/td><td>0.5%<\/td><td>0.5%<\/td><\/tr>\n<tr><td>3억~6억원<\/td><td>0.7%<\/td><td>0.7%<\/td><\/tr>\n<tr><td>6억~12억원<\/td><td>1.0%<\/td><td>1.0%<\/td><\/tr>\n<tr><td>12억~25억원<\/td><td>1.3%<\/td><td>2.0%<\/td><\/tr>\n<tr><td>25억~50억원<\/td><td>1.5%<\/td><td>3.0%<\/td><\/tr>\n<tr><td>50억~94억원<\/td><td>2.0%<\/td><td>4.0%<\/td><\/tr>\n<tr><td>94억원 초과<\/td><td>2.7%<\/td><td>5.0%<\/td><\/tr>\n<\/table>\n<p>종합합산토지는 1.0%~3.0%, 별도합산토지는 0.5%~0.7%의 세율이 별도로 적용됩니다.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec4\">4. 1세대 1주택 세액공제·부부공동명의 특례<\/h2>\n<p>1세대 1주택자(단독명의)는 산출세액에서 <b>고령자 공제<\/b>와 <b>장기보유 공제<\/b>를 받을 수 있고, 두 공제는 <b>중복 적용<\/b>됩니다(합산 한도 80%).<\/p>\n<table>\n<tr><th>고령자 공제(연령)<\/th><th>공제율<\/th><th>장기보유 공제(보유)<\/th><th>공제율<\/th><\/tr>\n<tr><td>60세 이상 65세 미만<\/td><td>20%<\/td><td>5년 이상 10년 미만<\/td><td>20%<\/td><\/tr>\n<tr><td>65세 이상 70세 미만<\/td><td>30%<\/td><td>10년 이상 15년 미만<\/td><td>40%<\/td><\/tr>\n<tr><td>70세 이상<\/td><td>40%<\/td><td>15년 이상<\/td><td>50%<\/td><\/tr>\n<\/table>\n<div class=\"tip\"><b>💡 부부 공동명의 1주택 특례<\/b><p style=\"margin:8px 0 0\">부부가 주택 1채를 공동으로 소유하면 기본공제가 각자 9억원씩 <b>합계 18억원<\/b>이라 유리할 수 있지만, 고령자·장기보유 세액공제는 못 받습니다. 반대로 <b>단독명의 방식(12억 공제 + 세액공제)<\/b>을 선택 신청할 수도 있어, 고령·장기보유일수록 단독명의 방식이 유리한 경우가 많습니다. 특례 신청기간은 <b>매년 9월 16일~9월 30일<\/b>입니다.<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec5\">5. 납부기간·분납·납부방법<\/h2>\n<ul>\n<li><b>납부기간<\/b>: 매년 <b>12월 1일~12월 15일<\/b>(국세청이 세액을 계산해 고지서를 보내주므로, 신고 없이 고지된 금액을 납부하면 됩니다. 직접 신고·납부도 가능).<\/li>\n<li><b>분납<\/b>: 납부세액이 <b>250만원을 초과<\/b>하면 일부를 납부기한 경과 후 <b>6개월 이내<\/b>에 나눠 낼 수 있습니다(250만~500만원은 250만원 초과분, 500만원 초과는 세액의 50% 이하).<\/li>\n<li><b>납부방법<\/b>: 홈택스·손택스(모바일), 신용카드(수수료 0.8%)·체크카드(0.5%), 가상계좌, 은행 방문 납부 등.<\/li>\n<\/ul>\n<div class=\"tip\"><b>💡 합산배제 신고<\/b><p style=\"margin:8px 0 0\">임대주택·사원용주택 등은 요건을 갖추면 종부세 과세에서 빼주는 <b>합산배제<\/b>를 받을 수 있습니다. 신고기간은 <b>매년 9월 16일~9월 30일<\/b>입니다.<\/p><\/div>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec6\">6. 자주 묻는 질문<\/h2>\n<h3>Q. 공시가격 10억원짜리 아파트 한 채만 있는데 종부세를 내나요?<\/h3>\n<p>내지 않습니다. 1세대 1주택자는 공시가격 12억원까지 공제되므로, 10억원이면 과세표준이 0이 되어 종부세 대상이 아닙니다. 재산세만 납부하면 됩니다.<\/p>\n<h3>Q. 6월 1일 직후에 집을 팔았는데 종부세가 나왔어요.<\/h3>\n<p>종부세는 6월 1일 소유자에게 부과됩니다. 6월 2일 이후 매도해도 그해 종부세는 6월 1일 기준 소유자가 부담합니다. 매매 시 잔금일을 6월 1일 전으로 맞추는지 여부가 세금에 영향을 줍니다.<\/p>\n<h3>Q. 내가 종부세 대상인지 미리 확인할 방법이 있나요?<\/h3>\n<p>있습니다. 홈택스 → 세금신고 → 종합부동산세 → <b>간이세액계산(모의계산)<\/b>에서 공시가격을 입력하면 예상 세액을 미리 확인할 수 있습니다. 공시가격은 '부동산공시가격알리미'에서 조회됩니다.<\/p>\n<a class=\"top\" href=\"#top\">▲ 맨 위로<\/a>\n<h2 id=\"sec7\">공식 확인 페이지<\/h2>\n<div class=\"gov\"><b>🏛️ 공식 안내 바로가기<\/b><a href=\"https://hometax.go.kr/websquare/websquare.html?w2xPath=/ui/pp/index_pp.xml&tmIdx=41&tm2lIdx=4113000000&tm3lIdx=4113030000\" target=\"_blank\" rel=\"nofollow\">▸ 홈택스 — 종합부동산세 간이세액계산(모의계산)<\/a><a href=\"https://www.nts.go.kr/nts/cm/cntnts/cntntsView.do?mi=2354&cntntsId=7736\" target=\"_blank\" rel=\"nofollow\">▸ 국세청 — 종합부동산세 세율·기본정보<\/a><\/div>\n<div class=\"end\"><b>✅ 마무리<\/b><p style=\"margin:8px 0 0\">종합부동산세는 매년 <b>6월 1일<\/b> 기준으로 부과되고 <b>12월 1일~15일<\/b>에 납부합니다. 1세대 1주택자는 <b>12억원 공제<\/b>에 고령자·장기보유 세액공제(최대 80%)까지 있어 실제 부담이 크지 않은 경우가 많습니다. 고지서를 받기 전, 홈택스 모의계산으로 내 세액을 미리 확인해 두세요.<\/p><\/div>\n<div class=\"src\"><b>📌 정보 기준 · 출처<\/b>이 글은 <b style=\"display:inline;color:#2c4a63;margin:0\">2026년 7월<\/b> 기준이며, 공제금액·세율·공정시장가액비율 등은 세법 개정에 따라 바뀔 수 있습니다. 신고·납부 전 홈택스 또는 국세청에서 최신 기준을 확인하세요.<br>출처: 국세청 종합부동산세 안내(nts.go.kr), 국세청 홈택스(hometax.go.kr), 종합부동산세법<\/div>\n<div class=\"rel\"><b>🔗 함께 보면 좋은 글<\/b><a href=\"https://lifeinfo8975.blogspot.com/2026/06/blog-post_268.html\">▸ 재산세 조회 납부 방법 카드혜택 총정리<\/a><a href=\"https://lifeinfo8975.blogspot.com/2026/07/1-1-12-2026.html\">▸ 양도소득세 1세대 1주택 비과세 요건 12억 계산 총정리 (2026)<\/a><a href=\"https://lifeinfo8975.blogspot.com/2026/06/2026_01019442348.html\">▸ 종합소득세 환급금 조회 방법 지급일 기한후신고 총정리 (2026)<\/a><\/div>\n<\/div>\n----------------------------------------------------------------\n▼ OSMU 확산용 핵심 3줄 요약 (네이버 블로그·쓰레드용)\n1. 매년 12월 날아오는 종합부동산세, 이름은 무섭지만 1주택자 대부분은 한 푼도 안 냅니다. 1세대 1주택자는 공시가격 12억원까지 공제되거든요(과세기준일은 매년 6월 1일).\n2. 과세표준 = (공시가격 합계 − 12억) × 60%. 세율은 2주택 이하 0.5~2.7%, 3주택 이상 0.5~5.0%. 60세 이상 고령자·장기보유 세액공제는 합쳐서 최대 80%까지 받습니다.\n3. 납부는 12월 1일~15일, 250만원 넘으면 6개월 분납 가능. 내가 대상인지 궁금하면 홈택스 '종부세 간이세액계산'에서 공시가격 넣고 미리 확인해 보세요!\n"},{"code":"A2-07","title":"아이돌봄서비스 정부지원 신청 방법 자격 이용요금 총정리 (2026 여름방학)","lane":"info","thumb":"","draft":"","facts":"각도=여름방학 돌봄공백. 시간제/종일제 유형·소득별 정부지원율·이용요금. 출처=아이돌봄(idolbom.go.kr)·복지로. 시의성🔥여름방학","added":"2026-07-18","thumb_data":null,"body":null},{"code":"A1-11","title":"전기차 구매보조금 신청 방법 국고 지자체 차종별 총정리 (2026)","lane":"info","thumb":"","draft":"","facts":"각도=상반기 예산소진 전 신청몰림. 국고+지자체 이중지원·차종별 상한. 출처=무공해차 통합누리집(ev.or.kr)·환경부. ⚠️코드 잠정(A1정부지원/D2자동차 중 작성시 확정). 시의성🔥예산","added":"2026-07-18","thumb_data":null,"body":null},{"code":"C2-06","title":"노인 무료 예방접종 독감 인플루엔자 폐렴구균 대상 시기 신청 방법 총정리 (2026)","lane":"info","thumb":"","draft":"","facts":"각도=가을 접종시즌 대비. 65세이상 무료 독감·폐렴구균 대상연령·보건소/위탁의료기관. 출처=질병관리청 예방접종도우미(nip.kdca.go.kr). 시의성🔥가을대비","added":"2026-07-18","thumb_da   const oNv=omAll.filter(r=>r.osmu.naver).length, oTh=omAll.filter(r=>r.osmu.threads).length;
  const oRecent=omAll.slice(-4).reverse();
  const nowN=pl.code?(STEPS.find(s=>checked.indexOf(s.n)<0)||{}).n:0;
  let pubHtml;
  if(pl.code){
    const pct=Math.round(done/STEPS.length*100);
    const lis=STEPS.map(st=>{
      const on=checked.indexOf(st.n)>=0, now=(!on&&st.n===nowN);
      const ic=on?CHECK:(now?NOWI:WAIT), cls=on?'on':(now?'now':'wait');
      return '<li class="'+cls+'">'+ic+'<span class="num">'+st.n+'</span>'
        +'<span class="who '+st.who+'">'+(st.who==='ai'?'🤖':'🧑')+'</span>'
        +'<span class="lbl">'+esc(st.t)+(st.star?'<span class="star">★</span>':'')+'</span></li>';
    }).join('');
    pubHtml='<div class="pcode">'+esc(pl.code)+'</div><div class="bar"><i style="width:'+pct+'%"></i></div>'
      +'<div class="cnt">'+done+' / '+STEPS.length+' 단계'+(pl.note?' · '+esc(pl.note):'')+'</div><ul>'+lis+'</ul>'
      +'<div class="banner'+(done===STEPS.length?' show':'')+'">✅ 발행·확산 완료</div>';
  }else{
    pubHtml='<div class="pcode none">진행 중인 발행 없음</div>';
  }
  const osmuLi=oRecent.map(r=>'<div class="row done">'+CHECK+'<span>'+esc(r.code)+' '+esc((r.title||'').slice(0,15))+'</span><span class="mut" style="margin-left:auto;font-size:10.5px">'+(r.osmu.naver?'네이버 ':'')+(r.osmu.threads?'쓰레드':'')+'</span></div>').join('');
  // 🤝 협업 — 세션별(collab.json: 정체성=레지스트리·활동=git log·상태=git status)
  const stLab={active:'활동중',uncommitted:'미커밋',idle:'대기'};
  const collabHtml=(collab&&collab.agents||[]).map(a=>{
    const acts=(a.recent||[]).map(r=>'<div class="act">'+esc((r.s||'').slice(0,40))+' <span class="d">'+esc(r.d||'')+'</span></div>').join('');
    return '<div class="agent"><div class="ah">'+esc(a.emoji||'')+'<span>'+esc(a.name||'')+'</span><span class="st '+(a.state||'idle')+'">'+(stLab[a.state]||a.state||'')+'</span></div>'
      +'<div class="role">'+esc(a.role||'')+'</div><div class="own">담당 '+esc(a.owns||'')+'</div>'+acts+'</div>';
  }).join('');
  // 💡 시스템 조언 — 라이브 데이터 조건에서만 도출(하드코딩 일반론 금지)
  const adv=[];
  if(idx&&typeof idx.indexed==='number'){
    const iDt=idx.checked_at?' ('+String(idx.checked_at).slice(5)+' 실측)':'';
    if(idx.indexed===0){const cr=Object.values(idx.posts||{}).filter(p=>p&&p.lastCrawl).length;
      adv.push('색인 0/'+idx.total+iDt+' — 크롤 '+cr+'편·미크롤 '+(idx.total-cr)+'편. GSC 일일한도+OSMU 백링크로 점진(재검토는 색인 잡힌 뒤).');}
    else adv.push('색인 '+idx.indexed+'/'+idx.total+'편'+iDt+'.');
  }
  if(oNv>oTh) adv.push('OSMU 쓰레드 '+oTh+'/'+oNv+' — '+(oNv-oTh)+'편 미게시(rate-limit 보류분 재시도 필요).');
  if(collab&&collab.uncommitted>=10) adv.push('미커밋 '+collab.uncommitted+'파일 — 발행 완료 후 세션별 커밋 분리 권장.');
  const adviceHtml=adv.length?'<div class="advice">'+adv.map(t=>'<div class="ai"><span class="ic">💡</span><span>'+esc(t)+'</span></div>').join('')+'</div>':'<div class="pcode none">현재 조치 필요 항목 없음</div>';
  // 📋 미결 관리 — 글별(pending.json: DB osmu + index_status에서 계산)
  const pc=(pend&&pend.counts)||{};
  const cb=(ok,l)=>'<span class="ch '+(ok?'on':'off')+'">'+l+(ok?'✓':'✗')+'</span>';
  const pendRows=(pend&&pend.actionable||[]).map(a=>{
    const c=a.ch||{};
    return '<div class="prow"><span class="pcd">'+esc(a.code)+'</span><span class="ptt">'+esc(a.title)+'</span>'
    +cb(c.g!==false,'G')+cb(c.n,'N')+cb(c.t,'T')+'</div>';
  }).join('');
  // 표시는 상위 14편으로 잘려 있음(pending.py) → 남은 수는 counts로 계산해 "…외 N편"
  const pendListed=(pend&&pend.actionable||[]).length;
  const pendTotal=Math.max(pc.osmu_pending||0,pc.index_pending||0);
  const pendMore=pendTotal>pendListed?'<div class="cnt">…외 '+(pendTotal-pendListed)+'편</div>':'';
  const pendHtml='<div class="cnt">OSMU 대기 '+(pc.osmu_pending||0)+'편 · 색인 대기 '+(pc.index_pending||0)+'편 / 전체 '+(pc.total||0)+'편</div>'+(pendRows||'<div class="pcode none">미결 없음</div>')+pendMore;
  // 📋 발행 대기 (발행 전 큐 — queue.json) : 코드·제목·썸네일을 한 카드로 묶어 '엉뚱한 글/썸네일' 눈으로 차단
  const qItems=(queue&&queue.items)||[];
  const laneLab={info:'정보성',pop:'대중관심'};
  const qCards=qItems.map(it=>{
    const th=it.thumb_data
      ?'<img class="qth" src="'+it.thumb_data+'" alt="">'
      :'<div class="qth none">썸네일<br>없음</div>';
    const facts=it.facts?'<div class="qfacts">'+esc(it.facts)+'</div>':'';
    const draft=it.draft?'<span class="qdraft">📄 '+esc(it.draft)+'</span>':'';
    const pv=it.body?'<button class="qpv" onclick="qpv(\''+esc(it.code||'')+'\')">👁 본문 미리보기</button>'
                    :'<span class="qpv none">초안 없음(작성 전)</span>';
    return '<div class="qcard">'+th
      +'<div class="qbody"><div class="qtop"><span class="qcode">'+esc(it.code||'')+'</span>'
      +'<span class="qlane '+(it.lane||'info')+'">'+esc(laneLab[it.lane]||it.lane||'')+'</span></div>'
      +'<div class="qtitle">'+esc(it.title||'')+'</div>'+facts
      +'<div class="qmeta">'+pv+draft+'</div></div></div>';
  }).join('');
  const qHtml=qItems.length
    ?'<div class="cnt">발행 대기 '+qItems.length+'건 — 발행하면 카드가 자동으로 사라집니다(사람 승인 게이트)</div>'+qCards
    :'<div class="pcode none">발행 대기 없음 — PREP 루틴이 준비하면 여기 카드로 뜹니다</div>';
  document.getElementById('board').innerHTML=
   '<div class="hd"><div class="t"><h1>진행현황</h1><span class="date">'+esc(date)+'</span></div>'
   +'<span class="badge '+bcls+'">'+CHECK+esc(blab)+'</span></div>'
   +'<div class="sec">오늘 한 일</div>'+today
   +'<div class="metrics">'
   +'<div class="m"><div class="l">검사 통과</div><div class="v">'+pass+' <small>/ '+total+'</small></div></div>'
   +'<div class="m"><div class="l">블로그 글</div><div class="v">'+count+' <small>편</small></div></div>'
   +'<div class="m"><div class="l">평균 본문</div><div class="v">'+avg+' <small>자</small></div></div>'
   +'</div>'
   +'<div class="div"></div>'
   +'<div class="sec">📋 발행 대기 (오늘 발행할 글)<span class="auto">🤖 PREP 큐</span></div>'+qHtml
   +'<div class="div"></div>'
   +'<div class="sec">발행 진행 (글 1편 · '+STEPS.length+'단계, 확산 포함)<span class="auto">🤖 자동</span></div>'+pubHtml
   +'<div class="div"></div>'
   +'<div class="sec">📡 3채널 발행 현황 (구글·네이버·쓰레드)<span class="auto">🤖 DB 자동집계</span></div>'
   +'<div class="metrics">'
   +'<div class="m"><div class="l">구글(원본)</div><div class="v">'+count+' <small>편</small></div></div>'
   +'<div class="m"><div class="l">네이버</div><div class="v">'+oNv+' <small>편</small></div></div>'
   +'<div class="m"><div class="l">쓰레드</div><div class="v">'+oTh+' <small>편</small></div></div>'
   +'</div>'
   +'<div class="cnt">확산 커버리지 · 네이버 '+(count?Math.round(oNv/count*100):0)+'% · 쓰레드 '+(count?Math.round(oTh/count*100):0)+'% · 교차링크 완료 '+omAll.length+'편</div>'
   +osmuLi
   +'<div class="div"></div>'
   +'<div class="sec">🤝 협업 — 세션별 역할·진행<span class="auto">git 자동분류</span></div>'+collabHtml
   +'<div class="sec">💡 시스템 조언<span class="auto">라이브 도출</span></div>'+adviceHtml
   +'<div class="div"></div>'
   +'<div class="sec">📋 미결 관리 — 3채널 매칭<span class="auto">G구글·N네이버·T쓰레드</span></div>'+pendHtml
   +'<div class="sec">다음</div><div class="next">'+next+'</div>'
   +'<div class="upd" id="upd"></div>';
  tick();
}
// 시계·데이터 기준만 갱신(보드 전체 재렌더 없음 — 정적 베이크 데이터라 시계만 변함)
function tick(){
  const el=document.getElementById('upd'); if(!el)return;
  const b=(window.__DATA__||{}).baked_at;
  el.textContent=(b?'데이터 기준 '+b+' · ':'')+new Date().toLocaleTimeString('ko-KR');
}
// 👁 발행 대기 카드 본문 미리보기 — 초안 HTML을 격리 iframe(srcdoc)로 렌더(스타일 누수 차단, Blogger 미접촉)
function qpv(code){
  const items=((window.__DATA__||{}).queue||{}).items||[];
  const it=items.find(x=>x.code===code); if(!it||!it.body)return;
  document.getElementById('qpv-ttl').textContent=(it.code||'')+' · '+(it.title||'');
  document.getElementById('qpv-fr').srcdoc='<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><base target="_blank"><body style="margin:0;padding:16px;background:#fff">'+it.body+'</body>';
  document.getElementById('qpv-ov').classList.add('show');
}
function qpvClose(){document.getElementById('qpv-ov').classList.remove('show');document.getElementById('qpv-fr').srcdoc='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')qpvClose();});
// 코드 자동 반영: 자기 자신(progress.html)을 주기적으로 fetch→해시 비교, 바뀌면 1회 reload
const _hash=s=>{let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return h;};
let _selfHash=null;
async function checkVersion(){
  try{
    const r=await fetch('progress.html?'+Date.now(),{cache:'no-store'});
    if(!r.ok)return;                                // 일시적 404/500에 해시 오염 → 불필요 reload 방지
    const t=await r.text();
    const h=_hash(t);
    if(_selfHash===null){_selfHash=h;return;}      // 첫 호출=기준선 저장
    if(h!==_selfHash) location.reload();            // 코드 변경 감지 → 자동 새로고침
  }catch(e){}
}
load(); checkVersion(); setInterval(tick,5000); setInterval(checkVersion,5000);
</script>
