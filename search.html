<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1626">
<title>생활정보 통합검색 · 생활정보 모음</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Noto Sans KR','Malgun Gothic',system-ui,sans-serif;background:#0f1626;color:#e8edf7}
  .wrap{max-width:760px;margin:0 auto;padding:18px 14px 60px}
  h1{font-size:19px;margin:0 0 4px;font-weight:800}
  h1 .dot{color:#06d6a0}
  .intro{color:#9fb0d0;font-size:13px;margin:0 0 16px;line-height:1.6}
  .searchbox{position:sticky;top:0;z-index:5;background:#0f1626;padding:10px 0 12px}
  .ipt{position:relative}
  .ipt input{width:100%;background:#16203a;border:1px solid #2a3a5e;color:#e8edf7;border-radius:12px;padding:15px 44px 15px 16px;font-size:16px;font-family:inherit}
  .ipt input:focus{outline:none;border-color:#4d9de0}
  .ipt .clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;border:none;background:#2a3a5e;color:#cdd8ee;border-radius:50%;width:26px;height:26px;font-size:15px;line-height:1;display:none}
  .hint{font-size:11.5px;color:#6f80a3;margin-top:7px;line-height:1.6}
  .cats{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 4px}
  .cats button{cursor:pointer;border:1px solid #2a3a5e;background:#16203a;color:#cdd8ee;border-radius:20px;padding:7px 12px;font-size:12.5px;font-weight:700;font-family:inherit}
  .cats button.active{background:#4d9de0;color:#fff;border-color:#4d9de0}
  .meta{font-size:12px;color:#9fb0d0;margin:14px 2px 8px}
  .card{display:flex;gap:13px;align-items:flex-start;text-decoration:none;background:#16203a;border:1px solid #2a3a5e;border-radius:14px;padding:14px 15px;margin-bottom:11px;transition:border-color .15s}
  .card:hover{border-color:#4d9de0}
  .card .thumb{flex:none;width:112px;aspect-ratio:1200/630;border-radius:10px;object-fit:cover;background:#0c1220;border:1px solid #233252}
  .card .cbody{flex:1;min-width:0}
  @media(max-width:480px){.card .thumb{width:88px}}
  .pill{display:inline-block;font-size:11px;font-weight:800;color:#fff;padding:3px 10px;border-radius:20px;margin-bottom:8px}
  .pill .c{opacity:.85;font-weight:700;margin-right:5px}
  .card h3{margin:0 0 7px;font-size:16px;color:#e8edf7;line-height:1.4;font-weight:700}
  .card h3 mark{background:#3a5a2a;color:#bff0a0;padding:0 2px;border-radius:3px}
  .card p{margin:0;color:#9fb0d0;font-size:13.5px;line-height:1.65}
  .card p mark{background:#3a5a2a;color:#bff0a0;padding:0 2px;border-radius:3px}
  .card .go{display:inline-block;margin-top:10px;font-size:12.5px;font-weight:700;color:#7fc1ff}
  .empty,.load{text-align:center;color:#6f80a3;font-size:14px;padding:40px 10px;line-height:1.8}
  .foot{text-align:center;color:#5a6b8c;font-size:11.5px;margin-top:24px;line-height:1.7}
  html[data-theme="light"] body{background:#f7f9fc;color:#1f2a3d}
  html[data-theme="light"] .intro{color:#5b6b86}
  html[data-theme="light"] .searchbox{background:#f7f9fc}
  html[data-theme="light"] .ipt input{background:#fff;border-color:#d7e0ee;color:#1f2a3d}
  html[data-theme="light"] .ipt .clr{background:#d7e0ee;color:#3a4a63}
  html[data-theme="light"] .hint{color:#8a97ab}
  html[data-theme="light"] .cats button{background:#fff;border-color:#d7e0ee;color:#3a4a63}
  html[data-theme="light"] .cats button.active{background:#4d9de0;color:#fff;border-color:#4d9de0}
  html[data-theme="light"] .meta{color:#5b6b86}
  html[data-theme="light"] .card{background:#fff;border-color:#e2e8f2;box-shadow:0 1px 3px rgba(20,40,80,.04)}
  html[data-theme="light"] .card .thumb{background:#eef2f8;border-color:#e2e8f2}
  html[data-theme="light"] .card h3{color:#1f2a3d}
  html[data-theme="light"] .card p{color:#5b6b86}
  html[data-theme="light"] .card .go{color:#1b6fc2}
  html[data-theme="light"] .empty,html[data-theme="light"] .load,html[data-theme="light"] .foot{color:#8a97ab}
  html[data-theme="light"] .card h3 mark,html[data-theme="light"] .card p mark{background:#dff5cf;color:#3a6a1a}
</style>
<script>(function(){try{if(new URLSearchParams(location.search).get('theme')==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
</head>
<body>
<div class="wrap">
  <h1>🔎 생활정보 통합검색 <span class="dot">·</span> 생활정보 모음</h1>
  <p class="intro">필요한 정보를 한 번에 찾으세요. 띄어쓰기·유사어·초성·분류코드로 검색되고, 각 글 요약을 먼저 보여드립니다.</p>
  <div class="searchbox">
    <div class="ipt">
      <input id="q" type="search" placeholder="예: 소비쿠폰, 임플란트, 여권, ㅈㄷㅊㅅ, A1" autocomplete="off">
      <button class="clr" id="clr" aria-label="지우기">×</button>
    </div>
    <div class="hint">💡 띄어쓰기 무관 · 유사어 자동확장 · 초성 검색 · 분류코드(예: F1) 검색 지원</div>
    <div class="cats" id="cats"></div>
  </div>
  <div class="meta" id="meta"></div>
  <div id="results"><div class="load">⏳ 글 목록을 불러오는 중…</div></div>
  <div class="foot">단일 데이터(lifeinfo_db) 기반 · 새 글이 등록되면 자동 반영됩니다.</div>
</div>
<script>
var DB="lifeinfo_db.txt?t="+Date.now();
var POSTS=[], CATCOLOR={}, curCat="전체";
var SYN=[
 ["여권","패스포트","passport","해외여행"],["임플란트","치아","치과","틀니","임플"],
 ["주택연금","역모기지","노후","연금"],["국민연금","노령연금","연금"],["기초연금","노령연금"],
 ["소비쿠폰","민생회복","민생","상품권","지역화폐"],["고유가","유가","기름값","유류"],
 ["보조금","지원금","정부지원","혜택"],["실업급여","고용보험","실직"],["근로장려금","근로장려"],
 ["건강검진","건강검사","검진"],["환급금","환급","돌려받기","숨은돈","숨은 돈"],
 ["자동차세","차세","자동차"],["재산세","집세금","부동산세"],["과태료","범칙금","벌금","딱지"],
 ["전입신고","이사","확정일자"],["등본","주민등록","정부24"],["알뜰폰","통신비","요금제"],
 ["로밍","유심","이심","데이터","esim"],["트래블카드","트래블","환전","해외카드"],
 ["면세","면세점","면세한도"],["마일리지","항공","항공권"],["휴양림","숲","자연휴양림","숲나들e"],
 ["캠핑장","야영장","고캠핑","캠핑"],["ktx","기차","코레일","열차"],["통행료","하이패스","고속도로"],
 ["렌터카","렌트카","자차"],["축제","행사","페스티벌"],["주차","공항주차","인천공항"],
 ["카카오톡","카톡","차단"],["유튜브","프리미엄","구독해지"],["인스타그램","인스타","계정삭제"],
 ["토익","어학","성적표"],["모임통장","카카오뱅크","회비","카뱅"],
 ["보건소","예방접종","독감","폐렴구균"],["대형폐기물","폐가전","무상수거","쓰레기"],
 ["부산진구","범천동","우리동네","부산"]
];
function expand(tok){var out=[tok];SYN.forEach(function(g){var hit=g.indexOf(tok)>=0;if(!hit)for(var i=0;i<g.length;i++){if(g[i].indexOf(tok)>=0||tok.indexOf(g[i])>=0){hit=true;break;}}if(hit)g.forEach(function(w){if(out.indexOf(w)<0)out.push(w);});});return out;}
function norm(s){return (s||"").toLowerCase().replace(/\s+/g,"").replace(/[·,./|()\[\]~!?\-]/g,"");}
var CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
function toCho(s){var r="";for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);if(c>=0xAC00&&c<=0xD7A3)r+=CHO[Math.floor((c-0xAC00)/588)];else r+=s[i];}return r;}
function isAllCho(s){return /^[ㄱ-ㅎ]+$/.test(s);}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

fetch(DB).then(function(r){return r.json();}).then(function(db){
  db.taxonomy.forEach(function(c){CATCOLOR[c.name]=c.color;});
  POSTS=db.posts.map(function(p){
    var hayRaw=p.title+" "+(p.desc||"")+" "+(p.tags||[]).join(" ")+" "+p.catName+" "+p.subName+" "+p.code;
    return {title:p.title,url:p.url,cat:p.catName,sub:p.subName,code:p.code,summary:p.desc||"",thumb:p.thumb||"",
            hay:norm(hayRaw),hayTitle:norm(p.title+" "+(p.tags||[]).join(" ")),cho:toCho((p.title).replace(/\s+/g,""))};
  });
  buildCats(db.taxonomy); render();
}).catch(fail);
function fail(){document.getElementById("results").innerHTML='<div class="empty">목록을 불러오지 못했습니다.<br>잠시 후 새로고침해 주세요.</div>';}

function buildCats(tax){
  var box=document.getElementById("cats"); box.innerHTML="";
  var all=document.createElement("button"); all.textContent="전체 "+POSTS.length; all.className="active";
  all.onclick=function(){curCat="전체";setActive(all);render();}; box.appendChild(all);
  tax.forEach(function(c){
    var n=POSTS.filter(function(p){return p.cat===c.name;}).length; if(!n)return;
    var b=document.createElement("button"); b.textContent=c.name+" "+n;
    b.onclick=function(){curCat=c.name;setActive(b);render();}; box.appendChild(b);
  });
}
function setActive(btn){[].forEach.call(document.getElementById("cats").children,function(x){x.classList.toggle("active",x===btn);});}

function score(p,tokens,choMode){
  if(choMode)return p.cho.indexOf(tokens[0])>=0?1:0;
  var s=0;
  for(var i=0;i<tokens.length;i++){
    var variants=expand(tokens[i]).map(norm).filter(Boolean),hit=0,tHit=0;
    for(var v=0;v<variants.length;v++){if(!variants[v])continue;if(p.hayTitle.indexOf(variants[v])>=0){tHit=1;hit=1;}else if(p.hay.indexOf(variants[v])>=0){hit=1;}}
    if(!hit)return 0; s+=tHit?3:1;
  }
  return s;
}
function hl(text,tokens){if(!tokens.length)return esc(text);var out=esc(text),words=[];tokens.forEach(function(t){expand(t).forEach(function(w){if(w.length>=2)words.push(w);});});words.sort(function(a,b){return b.length-a.length;});words.forEach(function(w){try{out=out.replace(new RegExp("("+w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark>$1</mark>");}catch(e){}});return out;}

function render(){
  var raw=document.getElementById("q").value.trim();
  var compact=raw.replace(/\s+/g,"");
  var choMode=isAllCho(compact)&&compact.length>=2;
  var tokens=choMode?[compact]:raw.split(/\s+/).map(norm).filter(Boolean);
  var list=POSTS.filter(function(p){return curCat==="전체"||p.cat===curCat;});
  if(tokens.length){
    list=list.map(function(p){return {p:p,sc:score(p,tokens,choMode)};}).filter(function(x){return x.sc>0;})
             .sort(function(a,b){return b.sc-a.sc;}).map(function(x){return x.p;});
  }
  document.getElementById("meta").textContent=raw?('“'+raw+'” 검색 결과 '+list.length+'건'):(curCat==="전체"?('전체 '+list.length+'편'):(curCat+' '+list.length+'편'));
  var box=document.getElementById("results");
  if(!list.length){box.innerHTML='<div class="empty">검색 결과가 없습니다.<br>다른 단어나 분류를 눌러보세요.</div>';return;}
  var ht=choMode?[]:raw.split(/\s+/).filter(Boolean);
  box.innerHTML=list.map(function(p){
    return '<a class="card" href="'+p.url+'" target="_blank" rel="noopener">'+
      (p.thumb?('<img class="thumb" loading="lazy" alt="" src="thumbs/'+esc(p.thumb)+'" onerror="this.style.display=\'none\'">'):'')+
      '<span class="cbody">'+
      '<span class="pill" style="background:'+(CATCOLOR[p.cat]||"#5b6b86")+'"><span class="c">'+p.code+'</span>'+esc(p.cat)+'</span>'+
      '<h3>'+hl(p.title,ht)+'</h3>'+
      '<p>'+hl(p.summary,ht)+'</p>'+
      '<span class="go">자세히 보기 →</span>'+
      '</span></a>';
  }).join("");
}
var q=document.getElementById("q"),clr=document.getElementById("clr"),tmr;
q.addEventListener("input",function(){clr.style.display=q.value?"block":"none";clearTimeout(tmr);tmr=setTimeout(render,130);});
clr.onclick=function(){q.value="";clr.style.display="none";render();q.focus();};
</script>
</body>
</html>
